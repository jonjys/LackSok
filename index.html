<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma – Läcksök Pro v4.1</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.mjs" type="module" id="pdfScript"></script>

    <style>
        :root {
            --bg:      #08080b;
            --card:    #111115;
            --hover:   #18181f;
            --border:  #1e1e28;
            --muted:   #6b6b7b;
            --text:    #f0f0f5;
            --green:   #1db954;
            --green2:  #1ed760;
            --red:     #ef4444;
            --orange:  #f97316;
            --yellow:  #eab308;
            --blue:    #38bdf8;
            --purple:  #c084fc;
            --teal:    #10b981;
            --r: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        code { font-family: 'SF Mono', 'Fira Code', monospace; }

        /* ── TOPBAR ─────────────────────────────────────────────────── */
        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 100; gap: 16px; }
        .topbar-brand { display: flex; align-items: center; gap: 12px; }
        .topbar-brand h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; background: linear-gradient(90deg,#fff,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space: nowrap; }
        .formula-chip { font-family: monospace; font-size: 12px; font-weight: 700; background: #1a2a1a; border: 1px solid #1db95444; color: var(--green); padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
        .topbar-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        /* ── BUTTONS ─────────────────────────────────────────────────── */
        .btn { border: none; padding: 8px 18px; font-size: 12px; font-weight: 700; border-radius: 50px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
        .btn:hover { opacity: 0.88; transform: scale(1.02); }
        .btn-primary  { background: var(--green); color: #000; }
        .btn-secondary{ background: transparent; border: 1px solid #333; color: var(--text); }
        .btn-secondary:hover { background: var(--hover); }
        .btn-danger   { background: #3a1010; border: 1px solid #7f1d1d; color: #fca5a5; }
        .btn-icon     { padding: 8px 12px; }

        /* ── FILE BAR ────────────────────────────────────────────────── */
        .file-bar { background: #0c0c10; border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; flex-direction: column; gap: 8px; }
        .file-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .file-chip  { background: var(--hover); border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 4px; }
        .prog-track { background: #1a1a22; border-radius: 20px; height: 5px; overflow: hidden; width: 100%; }
        .prog-fill  { background: var(--green); height: 5px; border-radius: 20px; transition: width 0.3s; width: 0%; }
        .prog-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

        /* ── CONTROL BAR ─────────────────────────────────────────────── */
        .control-bar { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; background: var(--card); }
        .stat-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .stat-chip { background: var(--hover); border: 1px solid var(--border); border-radius: var(--r); padding: 10px 16px; cursor: pointer; transition: border-color 0.15s; display: flex; flex-direction: column; gap: 2px; min-width: 100px; }
        .stat-chip:hover { border-color: #444; }
        .stat-chip.active { border-color: var(--green); background: #0f1f10; }
        .stat-chip .n { font-size: 22px; font-weight: 800; line-height: 1; }
        .stat-chip .l { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
        .stat-chip.c-red    { border-left: 3px solid var(--red);    }
        .stat-chip.c-orange { border-left: 3px solid var(--orange); }
        .stat-chip.c-yellow { border-left: 3px solid var(--yellow); }
        .stat-chip.c-teal   { border-left: 3px solid var(--teal);   }
        .stat-chip.c-white  { border-left: 3px solid #fff;          }

        .filter-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .area-pills { display: flex; flex-wrap: wrap; gap: 6px; }
        .pill { background: var(--hover); border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.15s; }
        .pill:hover { color: var(--text); border-color: #555; }
        .pill.active { background: var(--green); color: #000; border-color: var(--green); }
        .search-group { display: flex; gap: 8px; margin-left: auto; }
        .search-input { background: var(--hover); border: 1px solid var(--border); color: var(--text); padding: 7px 16px; border-radius: 50px; font-size: 12px; width: 220px; outline: none; }
        .search-input::placeholder { color: var(--muted); }
        .cat-select { background: var(--hover); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 50px; font-size: 12px; cursor: pointer; outline: none; }

        /* ── TABLE ───────────────────────────────────────────────────── */
        .table-wrap { padding: 0 24px 40px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        thead th { color: var(--muted); font-size: 10px; text-transform: uppercase; padding: 10px 12px; border-bottom: 2px solid var(--border); font-weight: 800; letter-spacing: 0.5px; cursor: pointer; user-select: none; white-space: nowrap; }
        thead th:hover { color: var(--text); }
        thead th.sort-asc::after  { content: ' ▲'; color: var(--green); }
        thead th.sort-desc::after { content: ' ▼'; color: var(--green); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.015); }
        tr:last-child td { border-bottom: none; }

        .row-aktiv_lacka td:first-child { border-left: 3px solid var(--red);    }
        .row-kund_lacka  td:first-child { border-left: 3px solid var(--orange); }
        .row-misstankt   td:first-child { border-left: 3px solid var(--yellow); }
        .row-lagad       td:first-child { border-left: 3px solid var(--teal);   }
        .row-varmepanna  td:first-child { border-left: 3px solid var(--blue);   }
        .row-storning    td:first-child { border-left: 3px solid var(--purple); }
        .row-normal      td:first-child { border-left: 3px solid #333;          }

        .addr { font-weight: 700; font-size: 13px; }
        .memo { font-size: 10px; color: #2dd4bf; background: #0f2020; border: 1px solid #1a3030; padding: 2px 6px; border-radius: 4px; margin-top: 3px; display: inline-block; }
        .badge-area { background: #1a1a28; color: #888; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
        .cat-sel { background: #14141a; color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 5px 8px; font-size: 11px; outline: none; cursor: pointer; }
        .copy-btn { background: #1a1a24; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: 0.15s; }
        .copy-btn:hover { background: var(--green); color: #000; border-color: var(--green); }

        .ratio-x  { color: var(--red);    font-weight: 800; font-size: 13px; }
        .ratio-h  { color: var(--orange); font-weight: 700; }
        .ratio-m  { color: var(--yellow); font-weight: 600; }
        .ratio-l  { color: var(--muted); }

        .empty-state { padding: 60px 24px; text-align: center; color: var(--muted); }
        .empty-state .big { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        /* ── MODAL ───────────────────────────────────────────────────── */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 500; align-items: center; justify-content: center; padding: 24px; }
        .overlay.open { display: flex; }
        .modal { background: #0f0f15; border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 720px; padding: 24px; position: relative; }
        .modal-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-hdr h3 { font-size: 15px; font-weight: 800; }
        .close-btn { background: transparent; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: var(--text); }
        .chart-wrap { height: 300px; position: relative; }
    </style>
</head>
<body>

<!-- ── TOPBAR ────────────────────────────────────────────────────── -->
<div class="topbar">
    <div class="topbar-brand">
        <h1>◆ KARMA LÄCKSÖK PRO</h1>
        <span class="formula-chip">=(E/F)−1</span>
        <span style="font-size:10px;color:var(--muted);display:none;" id="versionLabel">v4.1</span>
    </div>
    <div class="topbar-actions">
        <button class="btn btn-primary" id="uploadBtn">📁 Ladda filer</button>

        <button class="btn btn-danger btn-icon" id="clearBtn" title="Rensa allt">🗑️</button>
        <input type="file" id="fileInput" multiple style="display:none;" accept=".xlsx,.xls,.csv,.pdf">

</div>

<!-- ── FILE BAR ──────────────────────────────────────────────────── -->
<div class="file-bar" id="fileBar" style="display:none;">
    <div class="file-chips" id="fileChips"></div>
    <div id="progressWrap" style="display:none;">
        <div class="prog-track"><div id="progFill" class="prog-fill"></div></div>

</div>

<!-- ── CONTROL BAR ───────────────────────────────────────────────── -->
<div class="control-bar" id="controlBar" style="display:none;">
    <div class="stat-row" id="statRow"></div>
    <div class="filter-row">
        <div class="area-pills" id="areaPills">
            <button class="pill active" data-area="alla">Alla</button>
            <button class="pill" data-area="TUMBA">Tumba</button>
            <button class="pill" data-area="TULLINGE">Tullinge</button>
            <button class="pill" data-area="UTTRAN">Uttran</button>

            <button class="pill" data-area="NORSBORG">Norsborg</button>
            <button class="pill" data-area="ÖVRIGT">Övrigt</button>

            <input class="search-input" id="searchInput" placeholder="🔍 Sök adress / ID…">
            <select class="cat-select" id="catFilter">
                <option value="alla">Alla kategorier</option>
                <option value="aktiv_lacka">🚨 Aktivt läckage</option>
                <option value="kund_lacka">📬 Kundleckage</option>
                <option value="misstankt">⚠️ Misstänkt</option>
                <option value="lagad">✅ Lagat</option>
                <option value="varmepanna">🔥 Värmepanna</option>
                <option value="storning">⚡ Störning</option>
                <option value="normal">⚪ Normal</option>
            </select>
        </div>

</div>

<!-- ── TABLE ────────────────────────────────────────────────────── -->
<div id="tableWrap">
    <div class="empty-state" id="emptyState">
        <div class="big">📂</div>
        <p>Ladda upp Excel- eller PDF-filer med Kamstrup-mätardata.<br>Analysen körs automatiskt och sorterar på <strong>(E/F)−1</strong>.</p>
    </div>
    <div class="table-wrap" id="tableContainer" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th data-col="adress">Adress</th>
                    <th data-col="id">Serienummer</th>
                    <th data-col="area">Område</th>
                    <th data-col="lastVal" style="text-align:right;">E · Senaste</th>
                    <th data-col="avgVal"  style="text-align:right;">F · Genomsnitt</th>
                    <th data-col="ratio"   style="text-align:right;">(E/F)−1</th>
                    <th>Händelse</th>
                    <th>Kategori</th>
                    <th style="text-align:center;width:44px;"></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- ── TREND MODAL ───────────────────────────────────────────────── -->
<div class="overlay" id="trendOverlay">
    <div class="modal">
        <div class="modal-hdr">
            <h3 id="modalTitle">Brustrend</h3>
            <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let uploadedFiles  = [];
let currentResults = [];
let savedCategories = JSON.parse(localStorage.getItem('lacksok_cats') || '{}');
let sortCol = 'ratio';
let sortDir = 'desc';
let areaFilter = 'alla';
let catFilter  = 'alla';
let chartInst  = null;
let pdfLib     = null;

// Load PDF.js dynamically (ES module)
import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.mjs').then(m => {
    pdfLib = m;
    pdfLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.mjs';
}).catch(() => { /* PDF support unavailable */ });

// ── KÄNDA FÄLTÄRENDEN ──────────────────────────────────────────────────────
const KB = {
    "ALICE TEGNÉRS VÄG 23":  { cat:"varmepanna",  memo:"🔥 Värmepanna – bekräftat." },
    "ALICE TEGNERSVÄG 23":   { cat:"varmepanna",  memo:"🔥 Värmepanna – bekräftat." },
    "BROÄNGSVÄGEN 22":       { cat:"lagad",        memo:"✅ Lagad – historisk läcka." },
    "VATTRAVÄGEN 8":         { cat:"aktiv_lacka",  memo:"🚨 Aktivt – driften undersöker." },
    "LAXVÄGEN 8":            { cat:"aktiv_lacka",  memo:"📋 Kunds sida. Skickat till Jimmy." },
    "MALMSJÖVÄGEN 25":       { cat:"aktiv_lacka",  memo:"✔ Kunds sida – KUND INFORMERAD." },
    "LINDHOVSVÄGEN 3":       { cat:"aktiv_lacka",  memo:"📋 Gemensam servis 3/5/7." },
    "LINDHOVSVÄGEN 5":       { cat:"aktiv_lacka",  memo:"📋 Gemensam servis 3/5/7." },
    "LINDHOVSVÄGEN 7":       { cat:"aktiv_lacka",  memo:"📋 Gemensam servis 3/5/7." },
    "NIBBLEBACKEN 40":       { cat:"aktiv_lacka",  memo:"🚨 VÅR SIDA (KOMMUNEN)." },
    "DALKÄRRSVÄGEN 11":      { cat:"lagad",        memo:"✅ Lagad – servisledning." },
    "ENGWALLS VÄG 13":       { cat:"lagad",        memo:"✅ Lagad – SV till kund." },
    "STORVRETSVÄGEN 97":     { cat:"lagad",        memo:"✅ Lagad – huvudledning." },
    "LÖVHOLMENVÄGEN 15":     { cat:"lagad",        memo:"✅ Lagad – huvudledning." },
    "JAKTVÄGEN 2":           { cat:"lagad",        memo:"✅ Lagad – huvudledning." }
};

const CATS = {
    aktiv_lacka: { label:'Aktivt läckage', sym:'🚨', cl:'c-red'    },
    kund_lacka:  { label:'Kundleckage',    sym:'📬', cl:'c-orange'  },
    misstankt:   { label:'Misstänkt',      sym:'⚠️', cl:'c-yellow'  },
    lagad:       { label:'Lagat',          sym:'✅', cl:'c-teal'    },
    varmepanna:  { label:'Värmepanna',     sym:'🔥', cl:'c-blue'    },
    storning:    { label:'Störning',       sym:'⚡', cl:'c-purple'  },
    normal:      { label:'Normal',         sym:'⚪', cl:'c-white'   }
};

// ── HJÄLPFUNKTIONER ────────────────────────────────────────────────────────
const cleanAddr = a => (!a ? '' : a.toString().replace(/[\r\n]+/g,' ')
    .replace(/\b(TUMBA|TULLINGE|NORSBORG|UTTRAN|GRÖDINGE|\d{3}\s?\d{2})\b/gi,'')
    .trim().replace(/\s+/g,' ').toUpperCase());

const getArea = a => {
    const u = (a||'').toUpperCase();
    if (u.includes('TUMBA'))    return 'TUMBA';
    if (u.includes('TULLINGE')) return 'TULLINGE';
    if (u.includes('UTTRAN'))   return 'UTTRAN';
    if (u.includes('GRÖDINGE')) return 'GRÖDINGE';
    if (u.includes('NORSBORG')) return 'NORSBORG';
    return 'ÖVRIGT';
};

const toNum = v => typeof v === 'number' ? v :
    parseFloat((v||'').toString().replace(/[^0-9.,-]/g,'').replace(',','.')) || 0;

const fmtRatio = (r, avg) => {
    if (avg <= 0) return { text:'—', cls:'ratio-l' };
    const p = Math.round(r * 100);
    const s = (p > 0 ? '+' : '') + p + '%';
    return { text: s, cls: r>5?'ratio-x': r>1?'ratio-h': r>0.3?'ratio-m':'ratio-l' };
};

const fileDateFromName = (name, mod) => {
    const m = name.match(/(\d{4})[-_](\d{2})[-_](\d{2})/);
    return m ? new Date(m[1], m[2]-1, m[3]) : new Date(mod);
};

// ── KLASSIFICERING ─────────────────────────────────────────────────────────
function classify(ratio, infokod, cleanKey, serial) {
    if (savedCategories[serial]) return savedCategories[serial];
    const kb = KB[cleanKey];
    if (kb) return kb.cat;
    const info = (infokod||'').toUpperCase();
    if (info.includes('LÄCK') || info.includes('LEAK'))                       return 'aktiv_lacka';
    if (info.includes('EJ FASTSTÄLLT') || info.includes('ANNAT BRUS') ||
        info.includes('BRUS') || info.includes('STÖRN'))                      return 'storning';
    if (ratio > 5)   return 'aktiv_lacka';
    if (ratio > 1)   return 'misstankt';
    if (ratio > 0.3) return 'kund_lacka';
    return 'normal';
}

// ── EXCEL / CSV PARSER ─────────────────────────────────────────────────────
function parseExcel(file) {
    return new Promise((res, rej) => {
        const rdr = new FileReader();
        rdr.onload = e => {
            try {
                const wb  = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
                const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1, defval:'' });
                if (!raw || raw.length < 2) { res([]); return; }

                let hdrIdx = 0;
                for (let i = 0; i < Math.min(10, raw.length); i++) {
                    const j = raw[i].map(c=>(c||'').toString().toLowerCase()).join('|');
                    if (j.includes('adress') && j.includes('serienummer')) { hdrIdx = i; break; }
                }
                const hdr = raw[hdrIdx].map(h=>(h||'').toString().toLowerCase().trim());
                const fc  = (terms, fb) => { for(const t of terms){ const i=hdr.findIndex(h=>h.includes(t)); if(i!==-1)return i; } return fb; };

                const cA = fc(['adress','plats'], 2);
                const cS = fc(['serienummer','mätarnummer'], 3);
                const cE = fc(['senaste värde'], 5);
                const cF = fc(['genomsnittsvärde','genomsnitt'], 6);
                const cG = fc(['maxvärde'], 7);
                const cI = fc(['aktiva händelser','infokod'], 11);

                const fd = fileDateFromName(file.name, file.lastModified);
                const out = [];
                for (let i = hdrIdx+1; i < raw.length; i++) {
                    const row = raw[i];
                    const id  = (row[cS]||'').toString().trim();
                    const adr = (row[cA]||'').toString().trim();
                    if (!id || !adr) continue;
                    if (isNaN(Number(id)) && id.toLowerCase().includes('nummer')) continue;
                    out.push({ id, adress:adr, value:toNum(row[cE]), avgVal:toNum(row[cF]),
                        maxVal:toNum(row[cG])||toNum(row[cE]), infokod:(row[cI]||'').toString().trim(),
                        area:getArea(adr), fileDate:fd });
                }
                res(out);
            } catch(err) { rej(err); }
        };
        rdr.readAsArrayBuffer(file);
    });
}

// ── PDF PARSER (positions-baserad) ─────────────────────────────────────────
// Läser Kamstrup PDF-exporter genom att gruppera textelement på x/y-positioner
// och matcha kolumner mot rubrikradens x-koordinater.
async function parsePDF(file) {
    if (!pdfLib) return [];
    try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfLib.getDocument({ data: buf }).promise;
        const fd  = fileDateFromName(file.name, file.lastModified);

        // Samla alla textelement med position
        const allItems = [];
        for (let p = 1; p <= pdf.numPages; p++) {
            const page    = await pdf.getPage(p);
            const vp      = page.getViewport({ scale: 1 });
            const content = await page.getTextContent();
            content.items.filter(it => it.str.trim()).forEach(it => {
                allItems.push({
                    text: it.str.trim(),
                    x: Math.round(it.transform[4]),
                    y: Math.round(vp.height - it.transform[5]) + p * 10000
                });
            });
        }

        // Gruppera i rader baserat på y-position (tolerans 4px)
        const rowMap = new Map();
        allItems.forEach(it => {
            const key = Math.round(it.y / 4) * 4;
            if (!rowMap.has(key)) rowMap.set(key, []);
            rowMap.get(key).push(it);
        });
        const rows = [...rowMap.values()]
            .map(cells => cells.sort((a,b)=>a.x-b.x))
            .sort((a,b) => a[0].y - b[0].y);

        // Hitta rubrikrad och kartlägg kolumn-x-positioner
        let hdrIdx = -1, cols = {};
        for (let i = 0; i < Math.min(40, rows.length); i++) {
            const texts = rows[i].map(c=>c.text.toLowerCase());
            const joined = texts.join('|');
            if (joined.includes('adress') && joined.includes('serienummer')) {
                hdrIdx = i;
                rows[i].forEach(c => {
                    const t = c.text.toLowerCase();
                    if (t.includes('adress'))            cols.addr   = c.x;
                    if (t.includes('serienummer'))       cols.serial = c.x;
                    if (t === 'senaste värde' || t.includes('senaste värde')) cols.lastV  = c.x;
                    if (t.includes('genomsnitt'))        cols.avgV   = c.x;
                    if (t === 'maxvärde' || t === 'max') cols.maxV   = c.x;
                    if (t.includes('aktiva') || t.includes('infokod')) cols.info = c.x;
                });
                break;
            }
        }
        if (hdrIdx === -1 || !cols.serial) return [];

        const TOL  = 35;
        const getC = (cells, tx) => tx === undefined ? '' :
            (cells.find(c => Math.abs(c.x - tx) < TOL) || { text:'' }).text;

        const out = [];
        for (let i = hdrIdx+1; i < rows.length; i++) {
            const cells  = rows[i];
            const serial = getC(cells, cols.serial).replace(/\s/g,'');
            const addr   = getC(cells, cols.addr);
            if (!serial || !/^\d{6,12}$/.test(serial) || !addr || addr.length < 4) continue;

            out.push({
                id: serial, adress: addr,
                value:   toNum(getC(cells, cols.lastV)),
                avgVal:  toNum(getC(cells, cols.avgV)),
                maxVal:  toNum(getC(cells, cols.maxV)) || toNum(getC(cells, cols.lastV)),
                infokod: getC(cells, cols.info),
                area:    getArea(addr),
                fileDate: fd
            });
        }
        return out;
    } catch { return []; }
}

// ── FILHANTERING + AUTO-ANALYS ─────────────────────────────────────────────
async function handleFiles(files) {
    const arr   = Array.from(files);
    const BATCH = 5;
    const pgWrap = document.getElementById('progressWrap');
    const pgFill = document.getElementById('progFill');
    const pgLbl  = document.getElementById('progLabel');

    if (arr.length > 1) {
        pgWrap.style.display = 'block';
        pgFill.style.width = '0%';
        pgLbl.textContent = `Läser 0 av ${arr.length} filer…`;
    }

    document.getElementById('fileBar').style.display = 'block';

    for (let i = 0; i < arr.length; i += BATCH) {
        await Promise.allSettled(arr.slice(i, i+BATCH).map(async f => {
            try {
                const ext  = f.name.split('.').pop().toLowerCase();
                const data = ext === 'pdf' ? await parsePDF(f) : await parseExcel(f);
                if (data.length > 0) uploadedFiles.push({ name:f.name, date:f.lastModified, data });
            } catch {}
        }));
        const done = Math.min(i+BATCH, arr.length);
        pgFill.style.width = `${(done/arr.length)*100}%`;
        pgLbl.textContent  = `Läser ${done} av ${arr.length} filer…`;
        await new Promise(r => setTimeout(r, 30));
    }

    setTimeout(() => { pgWrap.style.display = 'none'; }, 1200);
    updateFileChips();
    runAnalysis(); // ← auto-analys direkt
}

function updateFileChips() {
    const el = document.getElementById('fileChips');
    el.innerHTML = uploadedFiles.map(f =>
        `<div class="file-chip">📄 ${f.name}</div>`
    ).join('') || '<span style="color:var(--muted);font-size:11px;">Inga filer</span>';
}

// ── ANALYS ─────────────────────────────────────────────────────────────────
function runAnalysis() {
    if (!uploadedFiles.length) return;
    const map = new Map();

    uploadedFiles.sort((a,b) => a.date - b.date);
    uploadedFiles.forEach(f => f.data.forEach(m => {
        if (!map.has(m.id)) {
            map.set(m.id, { ...m, history:[{ date:m.fileDate.toISOString().slice(0,10), v:m.value }] });
        } else {
            const cur = map.get(m.id);
            const ds  = m.fileDate.toISOString().slice(0,10);
            if (!cur.history.some(h=>h.date===ds)) cur.history.push({ date:ds, v:m.value });
            cur.value  = m.value;
            if (m.avgVal > 0) cur.avgVal = m.avgVal;
            if (m.maxVal > (cur.maxVal||0)) cur.maxVal = m.maxVal;
            if (m.infokod) cur.infokod = m.infokod;
            cur.adress = m.adress; cur.area = m.area;
        }
    }));

    currentResults = [];
    for (const [, m] of map) {
        m.history.sort((a,b) => a.date.localeCompare(b.date));
        const ratio    = m.avgVal > 0 ? (m.value / m.avgVal) - 1 : 0;
        const key      = cleanAddr(m.adress);
        const category = classify(ratio, m.infokod, key, m.id);
        const memo     = KB[key]?.memo || '';
        currentResults.push({
            id:m.id, adress:m.adress.replace(/[\r\n]+/g,' '), area:m.area,
            lastVal:m.value, avgVal:m.avgVal, maxVal:m.maxVal,
            infokod:m.infokod, ratio, category, memo, history:m.history
        });
    }

    applySort();
    document.getElementById('controlBar').style.display  = 'block';
    document.getElementById('emptyState').style.display  = 'none';
    document.getElementById('tableContainer').style.display = 'block';
    renderTable();
}

// ── SORTERING ──────────────────────────────────────────────────────────────
function applySort() {
    const d = sortDir === 'asc' ? 1 : -1;
    currentResults.sort((a,b) => {
        const va = a[sortCol], vb = b[sortCol];
        if (typeof va === 'number') return (va - vb) * d;
        return String(va).localeCompare(String(vb), 'sv') * d;
    });
}

function setSort(col) {
    if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortCol = col; sortDir = 'desc'; }
    applySort();
    renderTable();
}

// ── RENDERA TABELL ─────────────────────────────────────────────────────────
function renderTable() {
    const q     = document.getElementById('searchInput').value.toLowerCase().trim();
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    // Uppdatera sorteringspilar
    document.querySelectorAll('thead th[data-col]').forEach(th => {
        th.classList.remove('sort-asc','sort-desc');
        if (th.dataset.col === sortCol) th.classList.add('sort-'+sortDir);
    });

    let shown = 0;
    currentResults.forEach(r => {
        if (areaFilter !== 'alla' && r.area !== areaFilter)     return;
        if (catFilter  !== 'alla' && r.category !== catFilter)  return;
        if (q && !r.adress.toLowerCase().includes(q) && !r.id.includes(q)) return;
        shown++;

        const { text: ratioTxt, cls: ratioCls } = fmtRatio(r.ratio, r.avgVal);
        let opts = '';
        for (const [k,v] of Object.entries(CATS))
            opts += `<option value="${k}" ${r.category===k?'selected':''}>${v.sym} ${v.label}</option>`;

        const tr = document.createElement('tr');
        tr.className = `row-${r.category}`;
        tr.innerHTML = `
            <td>
                <div class="addr">${r.adress}</div>
                ${r.memo ? `<div class="memo">${r.memo}</div>` : ''}
            </td>
            <td><code>${r.id}</code></td>
            <td><span class="badge-area">${r.area}</span></td>
            <td style="text-align:right;font-weight:700;">${r.lastVal||'—'}</td>
            <td style="text-align:right;color:var(--muted);">${r.avgVal > 0 ? r.avgVal : '—'}</td>
            <td style="text-align:right;"><span class="${ratioCls}">${ratioTxt}</span></td>
            <td style="font-size:10px;color:var(--muted);max-width:120px;">${r.infokod||'—'}</td>
            <td><select class="cat-sel">${opts}</select></td>
            <td style="text-align:center;">
                <button class="copy-btn trend-btn" title="Visa trend">📈</button>
            </td>
        `;

        tr.querySelector('select').addEventListener('change', function() {
            r.category = this.value;
            savedCategories[r.id] = this.value;
            localStorage.setItem('lacksok_cats', JSON.stringify(savedCategories));
            tr.className = `row-${r.category}`;
            renderStats();
        });

        tr.querySelector('.trend-btn').addEventListener('click', () => openTrend(r));
        tbody.appendChild(tr);
    });

    renderStats(shown);
}

// ── STATISTIK ──────────────────────────────────────────────────────────────
function renderStats(shown) {
    const c = { total:0, aktiv:0, kund:0, misstankt:0 };
    currentResults.forEach(r => {
        c.total++;
        if (r.category==='aktiv_lacka') c.aktiv++;
        if (r.category==='kund_lacka')  c.kund++;
        if (r.category==='misstankt')   c.misstankt++;
    });

    const chip = (label, val, cls, filter) =>
        `<div class="stat-chip ${cls} ${catFilter===filter?'active':''}" data-cat="${filter}">
            <div class="n">${val}</div><div class="l">${label}</div>
         </div>`;

    document.getElementById('statRow').innerHTML =
        chip('Totalt mätare', c.total,     'c-white',  'alla')       +
        chip('Aktiva läckor', c.aktiv,     'c-red',    'aktiv_lacka')+
        chip('Kundleckage',   c.kund,      'c-orange', 'kund_lacka') +
        chip('Misstänkta',    c.misstankt, 'c-yellow', 'misstankt');

    document.querySelectorAll('.stat-chip').forEach(el => {
        el.addEventListener('click', () => {
            catFilter = el.dataset.cat;
            document.getElementById('catFilter').value = catFilter;
            renderTable();
        });
    });
}

// ── TRENDGRAF ──────────────────────────────────────────────────────────────
function openTrend(r) {
    document.getElementById('modalTitle').textContent = `Tidslinje — ${cleanAddr(r.adress)}`;
    document.getElementById('trendOverlay').classList.add('open');

    if (chartInst) chartInst.destroy();
    chartInst = new Chart(document.getElementById('trendChart').getContext('2d'), {
        type: 'line',
        data: {
            labels: r.history.map(h=>h.date),
            datasets:[{
                label:'Senaste värde',
                data: r.history.map(h=>h.v),
                borderColor:'#1db954', backgroundColor:'rgba(29,185,84,0.06)',
                fill:true, tension:0.3, pointRadius:4
            }]
        },
        options:{ responsive:true, maintainAspectRatio:false, scales:{ y:{ min:0 } } }
    });
}

// ── EXPORT ─────────────────────────────────────────────────────────────────
function exportReport() {
    if (!currentResults.length) { alert('Ingen data – kör analysen först.'); return; }
    const rows = currentResults.map(r => ({
        'Adress':           r.adress,
        'Serienummer':      r.id,
        'Område':           r.area,
        'Senaste (E)':      r.lastVal,
        'Genomsnitt (F)':   r.avgVal||'',
        '(E/F)−1 %':       r.avgVal>0 ? `${(r.ratio*100).toFixed(1)}%` : '—',
        'Aktiva händelser': r.infokod,
        'Kategori':         `${CATS[r.category]?.sym} ${CATS[r.category]?.label}`,
        'Notering':         r.memo
    }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Läcksök');
    XLSX.writeFile(wb, `lacksok-${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── EVENT LISTENERS ────────────────────────────────────────────────────────
document.getElementById('uploadBtn').onclick  = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e  => handleFiles(e.target.files);
document.getElementById('exportBtn').onclick  = () => exportReport();
document.getElementById('clearBtn').onclick   = () => {
    uploadedFiles=[]; currentResults=[];
    updateFileChips();
    document.getElementById('fileBar').style.display     = 'none';
    document.getElementById('controlBar').style.display  = 'none';
    document.getElementById('emptyState').style.display  = 'block';
    document.getElementById('tableContainer').style.display = 'none';
};

document.getElementById('searchInput').oninput = () => renderTable();
document.getElementById('catFilter').onchange  = e => { catFilter = e.target.value; renderTable(); };
document.getElementById('closeModal').onclick   = () => document.getElementById('trendOverlay').classList.remove('open');
document.getElementById('trendOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

document.querySelectorAll('.pill').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    b.classList.add('active');
    areaFilter = b.dataset.area;
    renderTable();
}));

document.querySelectorAll('thead th[data-col]').forEach(th =>
    th.addEventListener('click', () => setSort(th.dataset.col))
);
</script>
