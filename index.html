<script>
    // Globala tillstånd för applikationen
    let uploadedFiles = [];
    let currentResults = [];
    let ignoredIds = new Set();
    let interestingIds = new Set();
    let userCategories = new Map();
    let streetClusters = {};

    let currentSort = { column: 'change', direction: 'desc' };
    let currentAreaFilter = 'all';
    let currentCategoryFilter = 'all';

    // Kategorikonfigurationer matchat exakt efter dina nya val
    const categories = {
        extreme: { label: 'Extrem ökning', bg: '#ef4444', color: '#fff', symbol: '🔴', action: 'Akut Burst – åk ut direkt' },
        misstankt: { label: 'Misstänkt', bg: '#f97316', color: '#fff', symbol: '🟠', action: 'Förhöjt brus, bevaka utveckling' },
        leak_code: { label: 'Aktiv läcka felkod LEAK', bg: '#eab308', color: '#000', symbol: '🟡', action: 'Konstant flöde detekterat av mätaren' },
        lagad: { label: 'Valda lagade', bg: '#10b981', color: '#fff', symbol: '🟢', action: 'Markerad som åtgärdad' },
        storing: { label: 'Värmepannor/störningar', bg: '#6b7280', color: '#fff', symbol: '⚫', action: 'Misstänkt cyklisk eller källstörning' },
        normal: { label: 'Normal drift', bg: '#e5e7eb', color: '#374151', symbol: ' White ', action: 'Ingen åtgärd' }
    };

    // Smart sortering och mönsterigenkänning baserat på dina kategorier
    function smartClassify(meter) {
        if (!meter.history || meter.history.length === 0) return 'normal';
        
        const history = meter.history;
        const latest = history[history.length - 1].value;
        const first = history[0].value;
        
        const values = history.map(h => h.value);
        const maxVal = Math.max(...values);
        const minVal = Math.min(...values);
        
        // 1. Extrem ökning (Plötslig explosion i nattbrus)
        if (latest >= 50 && first <= 15 && (latest - first) >= 30) {
            return 'extreme';
        }
        
        // 2. Aktiv läcka felkod LEAK (Kan simuleras från rådata eller flaggas via infokod)
        if (meter.infokod && meter.infokod.toLowerCase().includes('leak')) {
            return 'leak_code';
        }
        
        // 3. Värmepannor / Störningar (Åker upp och ner kraftigt, eller juni-störning som ligger helt konstant men lågt)
        if (latest >= 20 && (maxVal - minVal) >= 25) {
            return 'storing';
        }
        
        // 4. Misstänkt (Jämn men tydlig förhöjning)
        if (latest >= 25 && latest < 50) {
            return 'misstankt';
        }
        
        return 'normal';
    }

    function runAnalysis() {
        if (uploadedFiles.length === 0) {
            alert("Ladda upp minst en fil först!");
            return;
        }

        uploadedFiles.sort((a, b) => a.date - b.date);
        currentResults = [];
        streetClusters = {};

        let metersMap = new Map();

        uploadedFiles.forEach(file => {
            const dateStr = formatShortDate(file.date);
            file.meters.forEach(m => {
                if (!metersMap.has(m.id)) {
                    metersMap.set(m.id, {
                        id: m.id,
                        adress: m.adress,
                        serienummer: m.serienummer,
                        area: m.area,
                        street: m.street,
                        infokod: m.infokod || '',
                        history: []
                    });
                }
                metersMap.get(m.id).history.push({
                    date: file.date,
                    dateStr: dateStr,
                    value: m.value
                });
            });
        });

        // Gatu-klusterberäkning
        metersMap.forEach(m => {
            if (m.history.length < 2) return;
            const first = m.history[0];
            const last = m.history[m.history.length - 1];
            
            if (!streetClusters[m.street]) {
                streetClusters[m.street] = { totalMeters: 0, increasingMeters: 0 };
            }
            streetClusters[m.street].totalMeters++;
            
            if (last.value > first.value && (last.value - first.value) >= 15) {
                streetClusters[m.street].increasingMeters++;
            }
        });

        for (let [id, m] of metersMap) {
            if (m.history.length === 0) continue;

            const first = m.history[0];
            const last = m.history[m.history.length - 1];
            
            let totalChange = 0;
            if (first.value > 0) {
                totalChange = ((last.value / first.value) - 1) * 100;
            } else if (last.value > 0) {
                totalChange = last.value * 100;
            }

            const maxValue = Math.max(...m.history.map(h => h.value));
            
            let finalCategory = userCategories.get(m.id);
            if (!finalCategory) finalCategory = smartClassify(m);
            
            currentResults.push({
                id: m.id,
                adress: m.adress,
                serienummer: m.serienummer,
                area: m.area,
                street: m.street,
                history: m.history,
                firstValue: first.value,
                latestValue: last.value,
                change: totalChange,
                max: maxValue,
                category: finalCategory,
                isCluster: streetClusters[m.street] && streetClusters[m.street].increasingMeters >= 2 && (streetClusters[m.street].increasingMeters / streetClusters[m.street].totalMeters) >= 0.35
            });
        }
        
        document.getElementById('results').style.display = 'block';
        displayResults();
    }

    function handleFiles(files) {
        let loadedCount = 0;
        for (let file of files) {
            const date = extractDateFromFilename(file.name);
            parseExcelFile(file).then(meters => {
                if (meters.length > 0) {
                    uploadedFiles.push({
                        name: file.name,
                        date: date,
                        meters: meters
                    });
                }
                loadedCount++;
                if (loadedCount === files.length) {
                    updateFileList();
                }
            });
        }
    }

    // Drar ihop och minimerar filområdet till en snygg kompakt rad
    function updateFileList() {
        const grid = document.getElementById('fileList');
        grid.innerHTML = '';
        
        if(uploadedFiles.length === 0) {
            grid.innerHTML = '<span class="no-files-text">Inga filer uppladdade för dagen</span>';
            return;
        }

        uploadedFiles.forEach((f, idx) => {
            const chip = document.createElement('div');
            chip.className = 'file-chip-compact';
            chip.innerHTML = `<span>📄 ${f.name.substring(0, 25)}... (${formatShortDate(f.date)})</span> <strong class="remove-file-x">×</strong>`;
            chip.querySelector('.remove-file-x').onclick = (e) => {
                e.stopPropagation();
                uploadedFiles.splice(idx, 1);
                updateFileList();
            };
            grid.appendChild(chip);
        });
    }

    function displayResults() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        currentResults.sort((a, b) => {
            let valA = a[currentSort.column];
            let valB = b[currentSort.column];
            if (currentSort.direction === 'desc') return valB - valA;
            return valA - valB;
        });

        let filtered = currentResults.filter(r => {
            if (currentAreaFilter !== 'all' && r.area !== currentAreaFilter) return false;
            if (currentCategoryFilter === 'ignored') return ignoredIds.has(r.id);
            if (ignoredIds.has(r.id)) return false; 
            if (currentCategoryFilter === 'interesting') return interestingIds.has(r.id);
            
            if (currentCategoryFilter !== 'all' && currentCategoryFilter !== 'cluster') {
                if (r.category !== currentCategoryFilter) return false;
            }
            if (currentCategoryFilter === 'cluster' && !r.isCluster) return false;
                
            if (query) {
                return r.adress.toLowerCase().includes(query) || 
                       r.serienummer.includes(query) || 
                       r.street.toLowerCase().includes(query);
            }
            return true;
        });

        updateStatsAndInsights(filtered);

        filtered.forEach(r => {
            const tr = document.createElement('tr');
            let rowClass = `row-${r.category}`;
            if (ignoredIds.has(r.id)) rowClass = 'row-ignored';
            else if (interestingIds.has(r.id)) rowClass = 'row-interesting';
            tr.className = rowClass;

            const catInfo = categories[r.category] || categories.normal;
            const historyStr = r.history.map(h => `${h.dateStr}: <strong>${h.value}</strong>`).join(' → ');
            const changeSign = r.change > 0 ? '+' : '';
            const changeClass = r.change > 0 ? 'trend-up' : (r.change < 0 ? 'trend-down' : '');

            let catOptions = '';
            for (let c in categories) {
                catOptions += `<option value="${c}" ${r.category === c ? 'selected' : ''}>${categories[c].symbol} ${categories[c].label}</option>`;
            }

            tr.innerHTML = `
                <td><button class="action-btn" onclick="toggleInteresting('${r.id}')">${interestingIds.has(r.id) ? '⭐' : '☆'}</button></td>
                <td><button class="action-btn" onclick="toggleIgnore('${r.id}')">${ignoredIds.has(r.id) ? '👁️‍queued' : '👁️'}</button></td>
                <td>
                    <select class="category-select-compact" onchange="changeCategory('${r.id}', this.value)">
                        ${catOptions}
                    </select>
                </td>
                <td>
                    <div class="table-adress-text">${r.adress}</div>
                    ${r.isCluster ? `<span class="cluster-banner">🔗 Gatu-kluster (${streetClusters[r.street].increasingMeters}/${streetClusters[r.street].totalMeters} mätare)</span>` : ''}
                </td>
                <td><code>${r.serienummer}</code></td>
                <td><span class="badge badge-normal">${r.area}</span></td>
                <td><div class="history-flow-container">${historyStr}</div></td>
                <td><span class="${changeClass}">${changeSign}${r.change.toFixed(1)}%</span></td>
                <td><strong>${r.max}</strong></td>
                <td><span class="badge" style="background:${catInfo.bg}; color:${catInfo.color}">${catInfo.label}</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateStatsAndInsights(filtered) {
        let counts = { total: filtered.length, extreme: 0, misstankt: 0, leak_code: 0, lagad: 0, storing: 0 };
        
        // Räkna baserat på dina nya filterval
        currentResults.forEach(r => {
            if (r.category === 'extreme') counts.extreme++;
            if (r.category === 'misstankt') counts.misstankt++;
            if (r.category === 'leak_code') counts.leak_code++;
            if (r.category === 'lagad') counts.lagad++;
            if (r.category === 'storing') counts.storing++;
        });

        const statsGrid = document.getElementById('statsGrid');
        statsGrid.innerHTML = `
            <div class="stat-card ${currentCategoryFilter === 'all' ? 'active' : ''}" onclick="setCategoryFilter('all')"><div class="num">${counts.total}</div><div class="label">Alla mätare</div></div>
            <div class="stat-card color-extreme ${currentCategoryFilter === 'extreme' ? 'active' : ''}" onclick="setCategoryFilter('extreme')"><div class="num">${counts.extreme}</div><div class="label">Extrem ökning</div></div>
            <div class="stat-card color-misstankt ${currentCategoryFilter === 'misstankt' ? 'active' : ''}" onclick="setCategoryFilter('misstankt')"><div class="num">${counts.misstankt}</div><div class="label">Misstänkt</div></div>
            <div class="stat-card color-leak ${currentCategoryFilter === 'leak_code' ? 'active' : ''}" onclick="setCategoryFilter('leak_code')"><div class="num">${counts.leak_code}</div><div class="label">Aktiva läckage LEAK</div></div>
            <div class="stat-card color-lagad ${currentCategoryFilter === 'lagad' ? 'active' : ''}" onclick="setCategoryFilter('lagad')"><div class="num">${counts.lagad}</div><div class="label">Valda lagade</div></div>
            <div class="stat-card color-storing ${currentCategoryFilter === 'storing' ? 'active' : ''}" onclick="setCategoryFilter('storing')"><div class="num">${counts.storing}</div><div class="label">Värmepannor/störningar</div></div>
        `;

        const insight = document.getElementById('insightBox');
        if (counts.extreme > 0 || counts.leak_code > 0) {
            insight.innerHTML = `⚠️ <strong>Systeminsikt:</strong> Läcksök Pro har upptäckt <strong>${counts.extreme} extrema burst-avvikelser</strong>. Kontrollera omedelbart delade serviser och pågående dygnsflöden.`;
            insight.style.backgroundColor = '#fdf2f2';
            insight.style.borderColor = '#ef4444';
        } else {
            insight.innerHTML = `💡 <strong>Systeminsikt:</strong> Inga akuta flödesexplosioner för tillfället. Fortsätt övervaka misstänkta mätare och stabila nattnivåer.`;
            insight.style.backgroundColor = '#e8f4f8';
            insight.style.borderColor = '#0070f3';
        }
    }

    function setCategoryFilter(cat) {
        currentCategoryFilter = cat;
        displayResults();
    }

    function setAreaFilter() {
        currentAreaFilter = document.getElementById('areaFilter').value;
        displayResults();
    }

    function setSort(col) {
        if (currentSort.column === col) {
            currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
        } else {
            currentSort.column = col;
            currentSort.direction = 'desc';
        }
        
        const labels = { change: 'Förändring %', latestValue: 'Senaste värde', max: 'Toppvärde' };
        const dirStr = currentSort.direction === 'desc' ? '(Högst först)' : '(Lägst först)';
        document.getElementById('sortIndicator').innerText = `📌 Sorterar efter: ${labels[col]} ${dirStr}`;
        
        displayResults();
    }

    function changeCategory(id, newCat) {
        userCategories.set(id, newCat);
        saveCategories();
        // Kör om analysen för att direkt flytta raden till rätt statskort/filter
        runAnalysis();
    }

    function exportReport() {
        if (currentResults.length === 0) return;
        
        const exportData = currentResults.map(r => {
            const catInfo = categories[r.category] || categories.normal;
            return {
                'Mätare ID': r.id,
                'Adress': r.adress,
                'Serienummer': r.serienummer,
                'Område': r.area,
                'Gata': r.street,
                'Första värde': r.firstValue,
                'Senaste värde': r.latestValue,
                'Förändring %': r.change.toFixed(2),
                'Toppvärde': r.max,
                'Klassificering': catInfo.label,
                'Gatu-kluster': r.isCluster ? 'JA' : 'NEJ'
            };
        });

        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.book_append_sheet(wb, ws, "Lacksokrapport");
        XLSX.writeFile(wb, `lacksokrapport_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    // Event listeners
    document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => handleFiles(Array.from(e.target.files));
    document.getElementById('analyzeBtn').onclick = () => runAnalysis();
    document.getElementById('clearBtn').onclick = () => {
        uploadedFiles = []; currentResults = []; ignoredIds.clear(); interestingIds.clear(); userCategories.clear();
        saveIgnored(); saveInteresting(); saveCategories();
        updateFileList();
        document.getElementById('results').style.display = 'none';
        document.getElementById('searchInput').value = '';
        document.getElementById('areaFilter').value = 'all';
        currentAreaFilter = 'all';
        setCategoryFilter('all');
    };

    document.getElementById('exportBtn').onclick = exportReport;
    document.getElementById('searchInput').oninput = () => displayResults();
    document.getElementById('areaFilter').onchange = () => setAreaFilter();

    document.getElementById('sort-change').onclick = () => setSort('change');
    document.getElementById('sort-latest').onclick = () => setSort('latestValue');
    document.getElementById('sort-max').onclick = () => setSort('max');

    window.toggleIgnore = toggleIgnore;
    window.toggleInteresting = toggleInteresting;
    window.changeCategory = changeCategory;
    window.setCategoryFilter = setCategoryFilter;

    loadSavedData();
    updateFileList();
</script>
