<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Läcksök - Mätaranalys med trender</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .app-container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #a8d8ea 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header p { color: rgba(255,255,255,0.7); font-size: 1rem; }
        .main-card { background: rgba(255,255,255,0.98); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); overflow: hidden; }
        .upload-section { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); padding: 24px 32px; border-bottom: 1px solid rgba(0,0,0,0.08); }
        .upload-area { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 20px; }
        .btn { padding: 10px 24px; border: none; border-radius: 60px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .btn-primary { background: linear-gradient(135deg, #1a5f7a, #0f3b4f); color: white; }
        .btn-success { background: linear-gradient(135deg, #2c7a4d, #1e5a38); color: white; }
        .btn-outline { background: white; border: 2px solid #2c7da0; color: #2c7da0; }
        .file-grid { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .file-chip { background: white; padding: 6px 16px; border-radius: 40px; font-size: 12px; border: 1px solid #ddd; cursor: pointer; }
        .file-chip:hover { background: #e9ecef; }
        .search-box { margin: 20px 0 0 0; }
        .search-input { width: 100%; padding: 14px 20px; font-size: 16px; border: 2px solid #e2e8f0; border-radius: 60px; outline: none; }
        .search-input:focus { border-color: #1a5f7a; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; border-radius: 16px; padding: 16px 12px; text-align: center; cursor: pointer; border: 1px solid #e9ecef; }
        .stat-card .num { font-size: 32px; font-weight: 700; color: #1a5f7a; }
        .stat-card.critical .num { color: #e74c3c; }
        .stat-card.interesting .num { color: #f39c12; }
        .stat-card .label { font-size: 12px; color: #64748b; }
        .filter-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
        .filter-btn { padding: 6px 16px; border-radius: 30px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: #1a5f7a; color: white; border-color: #1a5f7a; }
        .table-wrapper { overflow-x: auto; border-radius: 16px; background: white; max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 900px; }
        th { background: #f1f5f9; padding: 12px 10px; text-align: left; font-weight: 600; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:hover { background: #f8fafc; }
        .critical-row { background: #fee2e2 !important; }
        .high-row { background: #fff3e0 !important; }
        .ignored-row { background: #f5f5f5 !important; opacity: 0.6; }
        .interesting-row { background: #fff8e7 !important; }
        .trend-up { color: #e74c3c; font-weight: 700; }
        .trend-down { color: #27ae60; font-weight: 700; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; }
        .badge-leak { background: #c0392b; color: white; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 20px; }
        .action-btn:hover { background: #e9ecef; }
        .sparkline { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; }
        .spark-up-red { color: #e74c3c; font-weight: bold; }
        .spark-up-orange { color: #f39c12; font-weight: bold; }
        .spark-down { color: #27ae60; font-weight: bold; }
        .spark-flat { color: #95a5a6; }
        .history-tooltip { cursor: pointer; border-bottom: 1px dotted #999; }
        .info-footer { background: #f1f5f9; padding: 12px 20px; border-top: 1px solid #e2e8f0; font-size: 12px; }
        .results-section { padding: 24px 32px; background: white; }
        @media (max-width: 768px) { body { padding: 12px; } th, td { font-size: 11px; padding: 6px; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🔍 Läcksök</h1>
        <p>Analysera mätardata över flera datum • Trender • Upptäck läckage</p>
    </div>
    <div class="main-card">
        <div class="upload-section">
            <div class="upload-area">
                <button id="uploadBtn" class="btn btn-primary">📂 + Lägg till mätarfiler</button>
                <input type="file" id="fileInput" multiple accept=".xlsx,.xls" style="display:none">
                <button id="analyzeBtn" class="btn btn-success">📊 Analysera alla datum</button>
                <button id="clearBtn" class="btn btn-outline">🗑️ Rensa alla</button>
            </div>
            <div id="fileList" class="file-grid"></div>
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Sök på adress eller serienummer... t.ex. 'trast' eller '14733'">
            </div>
            <div class="filter-group">
                <button class="filter-btn active" data-filter="all">📋 Alla</button>
                <button class="filter-btn" data-filter="critical">🔥 >100%</button>
                <button class="filter-btn" data-filter="high">⚠️ 50-100%</button>
                <button class="filter-btn" data-filter="positive">✅ Positiva</button>
                <button class="filter-btn" data-filter="interesting">⭐ Intressanta</button>
                <button class="filter-btn" data-filter="ignored">🚫 Ignorerade</button>
                <button class="filter-btn" data-filter="leak">💧 LEAK</button>
            </div>
        </div>
        <div id="results" class="results-section" style="display:none">
            <div class="stats-grid" id="statsGrid"></div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width:40px">⭐</th>
                            <th style="width:40px">👁️</th>
                            <th>Adress</th>
                            <th style="width:90px">Serienummer</th>
                            <th style="width:70px">Första</th>
                            <th style="width:70px">Senaste</th>
                            <th style="width:90px">📈 Total</th>
                            <th style="width:130px">Period</th>
                            <th style="width:120px">Trend (↗↘)</th>
                            <th style="width:50px">Info</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="info-footer">
                💡 <strong>Trend-raden</strong> visar ↗ (upp) och ↘ (ner) mellan VARJE mätning<br>
                ⭐ Klicka på ☆ för att spara till "Intressanta" (att åka till)
            </div>
            <button id="exportBtn" class="btn btn-primary" style="margin-top:20px; width:100%;">📎 Exportera rapport (Excel)</button>
        </div>
    </div>
</div>

<script>
    let uploadedFiles = [];
    let currentResults = [];
    let ignoredIds = new Set();
    let interestingIds = new Set();
    let currentFilter = "all";

    function loadSaved() {
        const savedIgnored = localStorage.getItem('lacksok_ignored');
        if (savedIgnored) ignoredIds = new Set(JSON.parse(savedIgnored));
        const savedInteresting = localStorage.getItem('lacksok_interesting');
        if (savedInteresting) interestingIds = new Set(JSON.parse(savedInteresting));
    }

    function saveIgnored() { localStorage.setItem('lacksok_ignored', JSON.stringify([...ignoredIds])); }
    function saveInteresting() { localStorage.setItem('lacksok_interesting', JSON.stringify([...interestingIds])); }

    function toggleIgnore(id) {
        if (ignoredIds.has(id)) ignoredIds.delete(id);
        else { ignoredIds.add(id); if (interestingIds.has(id)) interestingIds.delete(id); }
        saveIgnored(); saveInteresting();
        displayResults();
    }

    function toggleInteresting(id) {
        if (interestingIds.has(id)) interestingIds.delete(id);
        else { interestingIds.add(id); if (ignoredIds.has(id)) ignoredIds.delete(id); }
        saveInteresting(); saveIgnored();
        displayResults();
    }

    function extractDateFromFilename(filename) {
        const match = filename.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2})-(\d{2})/);
        if (match) return new Date(`${match[1]}T${match[2]}:${match[3]}:00`);
        const match2 = filename.match(/(\d{4}-\d{2}-\d{2})/);
        if (match2) return new Date(match2[1]);
        return new Date();
    }

    function formatShortDate(date) {
        if (!date || isNaN(date)) return "okänt";
        return `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
    }

    async function parseExcelFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                    
                    if (!rows || rows.length < 2) { resolve([]); return; }
                    
                    // Hitta startraden (där "Adress" finns)
                    let startRow = -1;
                    let adressCol = 0, serialCol = 1, valueCol = 4, infokodCol = 9;
                    
                    for (let i = 0; i < Math.min(20, rows.length); i++) {
                        const row = rows[i];
                        if (!row) continue;
                        const firstCell = row[0] ? String(row[0]).toLowerCase() : "";
                        const secondCell = row[1] ? String(row[1]).toLowerCase() : "";
                        if (firstCell.includes('adress') || secondCell.includes('adress')) {
                            startRow = i;
                            adressCol = 0;
                            serialCol = 1;
                            break;
                        }
                    }
                    if (startRow === -1) {
                        startRow = 0;
                        adressCol = 0;
                        serialCol = 1;
                    }
                    
                    const meters = [];
                    for (let r = startRow + 1; r < rows.length; r++) {
                        const row = rows[r];
                        if (!row) continue;
                        
                        let adress = row[adressCol] ? String(row[adressCol]).trim().toUpperCase() : "";
                        let serienummer = row[serialCol] ? String(row[serialCol]).trim() : "";
                        let sensateValue = row[valueCol];
                        let infokod = row[infokodCol] ? String(row[infokodCol]).trim().toUpperCase() : "";
                        
                        // Rensa bort skräp
                        if (adress === "FALSKT" || adress === "FALSE" || adress === "") {
                            if (serienummer && serienummer !== "FALSKT") adress = serienummer;
                            else continue;
                        }
                        
                        // Hantera värdet
                        if (typeof sensateValue === 'string') sensateValue = parseFloat(sensateValue.replace(',', '.').trim());
                        else sensateValue = parseFloat(sensateValue);
                        
                        if (isNaN(sensateValue)) continue;
                        if (!adress && !serienummer) continue;
                        
                        // Kontrollera att serienummer inte är samma som adress
                        if (serienummer === adress) serienummer = "";
                        
                        meters.push({
                            id: serienummer || adress,
                            adress: adress,
                            serienummer: serienummer,
                            sensateValue: sensateValue,
                            infokod: infokod
                        });
                    }
                    resolve(meters);
                } catch (err) { resolve([]); }
            };
            reader.onerror = () => resolve([]);
            reader.readAsArrayBuffer(file);
        });
    }

    function calcChange(oldVal, newVal) {
        if (!oldVal || oldVal === 0 || isNaN(oldVal)) return null;
        return ((newVal - oldVal) / oldVal) * 100;
    }

    async function analyzeAllData() {
        if (uploadedFiles.length < 2) {
            alert("Ladda upp minst 2 filer (olika datum) för att kunna jämföra!");
            return;
        }
        
        uploadedFiles.sort((a,b) => a.date - b.date);
        const allMeters = new Map();
        
        for (let fileData of uploadedFiles) {
            for (let meter of fileData.meters) {
                if (!allMeters.has(meter.id)) {
                    allMeters.set(meter.id, {
                        id: meter.id,
                        adress: meter.adress,
                        serienummer: meter.serienummer,
                        measurements: [],
                        infokod: meter.infokod || ""
                    });
                }
                allMeters.get(meter.id).measurements.push({
                    date: fileData.date,
                    dateStr: formatShortDate(fileData.date),
                    value: meter.sensateValue
                });
            }
        }
        
        const results = [];
        for (let meter of allMeters.values()) {
            meter.measurements.sort((a,b) => a.date - b.date);
            if (meter.measurements.length < 2) continue;
            
            const first = meter.measurements[0];
            const last = meter.measurements[meter.measurements.length-1];
            const totalChange = calcChange(first.value, last.value);
            
            // Beräkna förändringar mellan VARJE mätning
            const changes = [];
            for (let i = 1; i < meter.measurements.length; i++) {
                const prev = meter.measurements[i-1];
                const curr = meter.measurements[i];
                const change = calcChange(prev.value, curr.value);
                if (change !== null && isFinite(change)) {
                    changes.push({
                        fromDate: prev.dateStr,
                        toDate: curr.dateStr,
                        fromVal: prev.value,
                        toVal: curr.value,
                        percent: change
                    });
                }
            }
            
            if (totalChange !== null && isFinite(totalChange)) {
                results.push({
                    id: meter.id,
                    adress: meter.adress,
                    serienummer: meter.serienummer,
                    firstValue: first.value,
                    lastValue: last.value,
                    firstDate: first.dateStr,
                    lastDate: last.dateStr,
                    changePercent: totalChange,
                    infokod: meter.infokod,
                    changes: changes,
                    allValues: meter.measurements.map(m => `${m.dateStr}:${m.value}`)
                });
            }
        }
        
        results.sort((a,b) => b.changePercent - a.changePercent);
        currentResults = results;
        displayResults();
    }

    function formatPercent(value) {
        if (value > 1000) return "🔥 " + Math.round(value) + "%";
        if (value > 100) return "⚠️ " + Math.round(value) + "%";
        if (value > 0) return "▲ " + value.toFixed(1) + "%";
        if (value < 0) return "▼ " + Math.abs(value).toFixed(1) + "%";
        return "0%";
    }

    // Skapa trend-rad med pilar ↗↘
    function createTrendIcons(changes) {
        if (!changes || changes.length === 0) return '<span class="spark-flat">→</span>';
        
        let icons = '';
        for (let c of changes) {
            if (c.percent > 20) icons += '<span class="spark-up-red" title="⬆️ Stor ökning">↗️⬆️</span>';
            else if (c.percent > 0) icons += '<span class="spark-up-orange" title="↗️ Ökning">↗️</span>';
            else if (c.percent < 0) icons += '<span class="spark-down" title="↘️ Minskning">↘️</span>';
            else icons += '<span class="spark-flat" title="Oförändrad">→</span>';
        }
        
        // Lägg till detaljer i tooltip
        const details = changes.map(c => `${c.fromDate}:${c.fromVal} → ${c.toDate}:${c.toVal} (${c.percent > 0 ? '+' : ''}${c.percent.toFixed(1)}%)`).join('\n');
        
        return `<span class="sparkline" title="${details}">${icons}</span>`;
    }

    function getInfokodBadge(kod) {
        if (!kod) return "";
        if (kod.includes("LEAK")) return '<span class="badge badge-leak">💧</span>';
        if (kod.includes("BURST")) return '<span class="badge" style="background:#e67e22;">💥</span>';
        return "";
    }

    function displayResults() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        
        let filtered = [...currentResults];
        
        if (currentFilter !== 'ignored') filtered = filtered.filter(r => !ignoredIds.has(r.id));
        else filtered = filtered.filter(r => ignoredIds.has(r.id));
        
        if (currentFilter === 'interesting') filtered = filtered.filter(r => interestingIds.has(r.id));
        if (currentFilter === 'leak') filtered = filtered.filter(r => r.infokod && r.infokod.includes("LEAK"));
        if (currentFilter === 'critical') filtered = filtered.filter(r => r.changePercent >= 100);
        else if (currentFilter === 'high') filtered = filtered.filter(r => r.changePercent >= 50 && r.changePercent < 100);
        else if (currentFilter === 'positive') filtered = filtered.filter(r => r.changePercent > 0);
        
        if (searchTerm) {
            filtered = filtered.filter(r => 
                r.adress.toLowerCase().includes(searchTerm) || 
                (r.serienummer && r.serienummer.includes(searchTerm))
            );
        }
        
        const total = currentResults.length;
        const active = currentResults.filter(r => !ignoredIds.has(r.id)).length;
        const critical = currentResults.filter(r => !ignoredIds.has(r.id) && r.changePercent >= 100).length;
        const high = currentResults.filter(r => !ignoredIds.has(r.id) && r.changePercent >= 50 && r.changePercent < 100).length;
        const leakCount = currentResults.filter(r => !ignoredIds.has(r.id) && r.infokod && r.infokod.includes("LEAK")).length;
        const interestingCount = interestingIds.size;
        
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card" onclick="setFilter('all')"><div class="num">${active}</div><div class="label">📊 Aktiva</div></div>
            <div class="stat-card critical" onclick="setFilter('critical')"><div class="num">${critical}</div><div class="label">🔥 >100%</div></div>
            <div class="stat-card" onclick="setFilter('high')"><div class="num">${high}</div><div class="label">⚠️ 50-100%</div></div>
            <div class="stat-card" onclick="setFilter('leak')"><div class="num">${leakCount}</div><div class="label">💧 LEAK</div></div>
            <div class="stat-card interesting" onclick="setFilter('interesting')"><div class="num">${interestingCount}</div><div class="label">⭐ Intressanta</div></div>
        `;
        
        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; padding:40px;">🔍 Ingen mätare matchar</td></tr>`;
            document.getElementById('results').style.display = 'block';
            return;
        }
        
        let html = '';
        for (let r of filtered) {
            const isIgnored = ignoredIds.has(r.id);
            const isInteresting = interestingIds.has(r.id);
            
            let rowClass = '';
            if (isIgnored) rowClass = 'ignored-row';
            else if (isInteresting) rowClass = 'interesting-row';
            else if (r.changePercent >= 100) rowClass = 'critical-row';
            else if (r.changePercent >= 50) rowClass = 'high-row';
            
            const trendIcons = createTrendIcons(r.changes);
            const historyText = r.allValues.join(' → ');
            
            // Visa serienummer, men om det är samma som adress, visa bara första delen
            let displaySerial = r.serienummer || "-";
            if (displaySerial === r.adress) displaySerial = "-";
            
            html += `<tr class="${rowClass}">
                <td><button class="action-btn" onclick="toggleInteresting('${r.id}')" title="${isInteresting ? 'Ta bort från intressanta' : 'Markera som intressant (åka till)'}">${isInteresting ? '⭐' : '☆'}</button></td>
                <td><button class="action-btn" onclick="toggleIgnore('${r.id}')" title="${isIgnored ? 'Återställ' : 'Ignorera'}">${isIgnored ? '✅' : '👁️'}</button></td>
                <td><strong>${r.adress.length > 45 ? r.adress.substring(0,42)+"..." : r.adress}</strong>${isInteresting ? ' <span style="background:#f39c12;color:white;padding:2px 6px;border-radius:12px;font-size:10px;">⭐</span>' : ''}${isIgnored ? ' <span style="background:#95a5a6;color:white;padding:2px 6px;border-radius:12px;font-size:10px;">🚫</span>' : ''}</td>
                <td>${displaySerial}</td>
                <td>${r.firstValue}</td>
                <td><strong>${r.lastValue}</strong></td>
                <td class="trend-up">${formatPercent(r.changePercent)}</td>
                <td>${r.firstDate} → ${r.lastDate}</td>
                <td class="history-tooltip" title="${historyText}">${trendIcons}</td>
                <td>${getInfokodBadge(r.infokod)}</td>
            </tr>`;
        }
        tbody.innerHTML = html;
        document.getElementById('results').style.display = 'block';
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.dataset.filter === filter) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        displayResults();
    }

    async function handleFiles(files) {
        for (let file of files) {
            if (file.name.match(/\.(xlsx|xls)$/i)) {
                const date = extractDateFromFilename(file.name);
                const meters = await parseExcelFile(file);
                uploadedFiles.push({ fileName: file.name, date: date, meters: meters });
                console.log(`Laddade ${meters.length} mätare från ${file.name}`);
            }
        }
        updateFileList();
        if (uploadedFiles.length >= 2) analyzeAllData();
    }

    function updateFileList() {
        const container = document.getElementById('fileList');
        if (uploadedFiles.length === 0) {
            container.innerHTML = '<p style="color:#718096;">📌 Inga filer uppladdade än</p>';
            return;
        }
        let html = '';
        uploadedFiles.forEach((f, idx) => {
            html += `<div class="file-chip" onclick="removeFile(${idx})">📅 ${formatShortDate(f.date)} (${f.meters.length} mätare) ✖</div>`;
        });
        container.innerHTML = html;
    }

    window.removeFile = function(idx) {
        uploadedFiles.splice(idx, 1);
        updateFileList();
        if (uploadedFiles.length >= 2) analyzeAllData();
        else document.getElementById('results').style.display = 'none';
    };

    function exportReport() {
        if (currentResults.length === 0) return alert("Ingen data att exportera");
        const exportData = currentResults.map(r => ({
            'Adress': r.adress,
            'Serienummer': r.serienummer === r.adress ? "" : r.serienummer,
            'Första värde': r.firstValue,
            'Senaste värde': r.lastValue,
            'Total förändring %': r.changePercent.toFixed(2),
            'Period': `${r.firstDate} → ${r.lastDate}`,
            'Infokod': r.infokod || '',
            'Intressant': interestingIds.has(r.id) ? 'Ja' : '',
            'Ignorerad': ignoredIds.has(r.id) ? 'Ja' : '',
            'Historik': r.allValues.join(' → ')
        }));
        const ws = XLSX.utils.json_to_sheet(exportData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Läcksök_Rapport");
        XLSX.writeFile(wb, `lacksok_${new Date().toISOString().slice(0,19)}.xlsx`);
    }

    // Event listeners
    document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => handleFiles(Array.from(e.target.files));
    document.getElementById('analyzeBtn').onclick = () => analyzeAllData();
    document.getElementById('clearBtn').onclick = () => {
        uploadedFiles = []; currentResults = []; ignoredIds.clear(); interestingIds.clear();
        saveIgnored(); saveInteresting();
        updateFileList();
        document.getElementById('results').style.display = 'none';
        document.getElementById('searchInput').value = '';
    };
    document.getElementById('exportBtn').onclick = exportReport;
    document.getElementById('searchInput').oninput = () => displayResults();
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => setFilter(btn.dataset.filter);
    });
    
    window.toggleIgnore = toggleIgnore;
    window.toggleInteresting = toggleInteresting;
    window.setFilter = setFilter;
    
    loadSaved();
    updateFileList();
    console.log("Läcksök redo - ladda upp dina Excel-filer!");
</script>
</body>
</html>
