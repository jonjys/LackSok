<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karma - Läcksök Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #ffffff;
            --text-muted: #b3b3b3;
            --primary: #1db954;
            --border-color: #282828;
            
            /* Statusfärger baserade på Kamstrups ALD-analys */
            --clr-extreme: #ef4444;
            --clr-misstankt: #f97316;
            --clr-leak: #eab308;
            --clr-lagad: #10b981;
            --clr-storing: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .upload-section {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            transform: scale(1.04);
            background-color: #1ed760;
        }

        button.secondary {
            background-color: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
        }

        button.secondary:hover {
            background-color: rgba(255,255,255,0.1);
            border-color: var(--text-main);
        }

        button.danger {
            background-color: #b91c1c;
        }
        button.danger:hover {
            background-color: #ef4444;
        }

        .file-grid-compact {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            max-height: 90px;
            overflow-y: auto;
            padding: 8px;
            background: #0b0b0b;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .file-chip-compact {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            background: #222;
            color: var(--text-main);
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            min-width: 180px;
        }

        .remove-file-x {
            color: var(--clr-extreme);
            cursor: pointer;
            font-size: 14px;
            margin-left: 8px;
        }

        .no-files-text {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .stat-card:hover {
            background-color: var(--bg-card-hover);
        }

        .stat-card.active {
            border: 2px solid var(--primary);
            background-color: rgba(29, 185, 84, 0.05);
        }

        .stat-card .num {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-card.color-extreme { border-left: 5px solid var(--clr-extreme); }
        .stat-card.color-misstankt { border-left: 5px solid var(--clr-misstankt); }
        .stat-card.color-leak { border-left: 5px solid var(--clr-leak); }
        .stat-card.color-lagad { border-left: 5px solid var(--clr-lagad); }
        .stat-card.color-storing { border-left: 5px solid var(--clr-storing); }

        .insight-box {
            padding: 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 24px;
            border-left: 4px solid var(--primary);
            background-color: var(--bg-card);
            line-height: 1.6;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 16px;
        }

        .search-input {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            width: 300px;
            outline: none;
        }

        .filter-select {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            outline: none;
            cursor: pointer;
        }

        .results-container {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 16px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        .sort-indicator {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        th:hover {
            color: white;
        }

        td {
            padding: 14px 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            vertical-align: middle;
        }

        tr:hover td {
            background-color: rgba(255,255,255,0.03);
        }

        .row-extreme td { border-left: 3px solid var(--clr-extreme); }
        .row-misstankt td { border-left: 3px solid var(--clr-misstankt); }
        .row-leak_code td { border-left: 3px solid var(--clr-leak); }
        .row-lagad td { border-left: 3px solid var(--clr-lagad); }
        .row-storing td { border-left: 3px solid var(--clr-storing); }

        .table-adress-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .table-adress-text {
            font-weight: 600;
            font-size: 14px;
        }

        .copy-btn {
            background: #222;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .cluster-banner {
            display: inline-block;
            background: rgba(249, 115, 22, 0.12);
            border: 1px solid var(--clr-misstankt);
            color: #f97316;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
            font-weight: bold;
        }

        .history-flow-container {
            font-family: monospace;
            font-size: 11px;
            background: #111;
            padding: 6px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .category-select-compact {
            background: #222;
            color: white;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 4px;
            font-size: 12px;
        }

        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }

        .trend-up { color: #ef4444; font-weight: bold; }
        .trend-down { color: #10b981; }
    </style>
</head>
<body>

    <h1>Karma - Läcksök Pro</h1>
    <div class="subtitle">Akustisk distributionsanalys för Kamstrup flowIQ® mätarnätverk</div>

    <div class="upload-section">
        <div class="btn-group">
            <button id="uploadBtn">📁 Välj Excel-filer</button>
            <button id="analyzeBtn" class="secondary">⚡ Kör Morgonanalys</button>
            <button id="exportBtn" class="secondary">📥 Exportera Rapport</button>
            <button id="clearBtn" class="secondary danger">🗑️ Nollställ</button>
            <input type="file" id="fileInput" multiple style="display: none;" accept=".xlsx, .xls, .csv">
        </div>
        
        <div class="file-grid-compact" id="fileList">
            <span class="no-files-text">Inga datafiler laddade</span>
        </div>
    </div>

    <div id="results" style="display: none;">
        
        <div class="stats-grid" id="statsGrid"></div>

        <div class="insight-box" id="insightBox"></div>

        <div class="toolbar">
            <div>
                <input type="text" id="searchInput" class="search-input" placeholder="Sök adress, gata eller mätarnummer...">
                <select id="areaFilter" class="filter-select">
                    <option value="all">Alla områden</option>
                </select>
            </div>
            <div id="sortIndicator" class="sort-indicator">📌 Sortering: Brusförändring %</div>
        </div>

        <div class="results-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 40px;">Märk</th>
                        <th style="width: 40px;">Dölj</th>
                        <th style="width: 120px;">Klassa</th>
                        <th>Adress / Fastighet</th>
                        <th style="width: 90px; text-align: center;">Exportera</th>
                        <th>Mätarnummer</th>
                        <th>Område</th>
                        <th>Historiskt Lägsta Bakgrundsbrus (dB)</th>
                        <th id="sort-change">Förändring</th>
                        <th id="sort-max">Max</th>
                        <th>Status-Klassificering</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        let currentResults = [];
        let ignoredIds = new Set();
        let interestingIds = new Set();
        let userCategories = new Map();
        let streetClusters = {};

        let currentSort = { column: 'change', direction: 'desc' };
        let currentAreaFilter = 'all';
        let currentCategoryFilter = 'all';

        const categories = {
            extreme: { label: 'Akut explosion', bg: '#ef4444', color: '#fff', symbol: '🔴' },
            misstankt: { label: 'Förhöjt brus', bg: '#f97316', color: '#fff', symbol: '🟠' },
            leak_code: { label: 'Kamstrup LEAK', bg: '#eab308', color: '#000', symbol: '🟡' },
            storing: { label: 'Konstant störning / Pump', bg: '#38bdf8', color: '#fff', symbol: '🔵' },
            lagad: { label: 'Markerad lagad', bg: '#10b981', color: '#fff', symbol: '🟢' },
            normal: { label: 'Normal bakgrund', bg: '#333', color: '#bbb', symbol: '⚪' }
        };

        function extractDateFromFilename(filename) {
            const reg = /(\d{4})[-_](\d{2})[-_](\d{2})/;
            const match = filename.match(reg);
            return match ? new Date(match[1], match[2] - 1, match[3]) : new Date();
        }

        function formatShortDate(date) {
            return date.toISOString().slice(0, 10);
        }

        function cleanStreetName(address) {
            if (!address) return 'OKÄND GATA';
            let clean = address.split(/\d+/)[0].trim();
            return clean.toUpperCase();
        }

        function parseExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        
                        let meters = [];
                        jsonData.forEach(row => {
                            let id = row['Serienummer'] || row['Mätarnummer'] || row['Mätare ID'] || row['id'];
                            let address = row['Adress'] || row['Plats'] || row['address'];
                            let value = parseFloat(row['Senaste värde'] || row['Senaste avläsning'] || row['Brus'] || row['value'] || 0);
                            let infokod = row['Infokod'] || row['Aktiva händelser'] || row['Felkod'] || '';
                            let area = row['Område'] || row['Ort'] || 'Distrikt';

                            if (id) {
                                meters.push({
                                    id: id.toString().trim(),
                                    adress: address ? address.toString().trim() : 'Saknar adress',
                                    serienummer: id.toString().trim(),
                                    value: isNaN(value) ? 0 : value,
                                    infokod: infokod.toString(),
                                    area: area.toString().trim(),
                                    street: cleanStreetName(address)
                                });
                            }
                        });
                        resolve(meters);
                    } catch (err) { reject(err); }
                };
                reader.onerror = () => reject(reader.error);
                reader.readAsArrayBuffer(file);
            });
        }

        // Förbättrad Kamstrup ALD-klassificering: Sorterar bort falska akuta explosioner
        function smartClassify(meter) {
            if (!meter.history || meter.history.length === 0) return 'normal';
            
            const history = meter.history;
            const latest = history[history.length - 1].value;
            const first = history[0].value;
            
            const values = history.map(h => h.value);
            const maxVal = Math.max(...values);
            const minVal = Math.min(...values);
            const variance = maxVal - minVal;
            
            // 1. Kamstrups inbyggda felkod för läckage (efter mätaren) går alltid först
            if (meter.infokod && meter.infokod.toLowerCase().includes('leak')) {
                return 'leak_code';
            }
            
            // 2. Filtrering för instabilt flöde (högt sen lågt/hoppigt brus) -> Störning/Pump
            if (variance >= 15 && latest < maxVal - 10) {
                return 'storing';
            }

            // 3. Riktig Akut Explosion kräver stabil, explosiv ökning hela vägen upp till höga nivåer
            if (latest >= 48 && first <= 18 && (latest - first) >= 25 && variance <= 6) {
                return 'extreme';
            }
            
            // 4. Konstant hög men flack kurva indikerar pump eller cyklisk störning
            if (latest >= 22 && variance <= 3 && history.length >= 3) {
                return 'storing';
            }
            
            // 5. Förhöjt allmänt bakgrundsbrus
            if (latest >= 22) {
                return 'misstankt';
            }
            
            return 'normal';
        }

        function runAnalysis() {
            if (uploadedFiles.length === 0) {
                alert("Vänligen ladda upp datafiler först.");
                return;
            }

            uploadedFiles.sort((a, b) => a.date - b.date);
            currentResults = [];
            streetClusters = {};
            let metersMap = new Map();
            let areasSet = new Set();

            uploadedFiles.forEach(file => {
                const dateStr = formatShortDate(file.date);
                file.meters.forEach(m => {
                    areasSet.add(m.area);
                    if (!metersMap.has(m.id)) {
                        metersMap.set(m.id, {
                            id: m.id,
                            adress: m.adress,
                            serienummer: m.serienummer,
                            area: m.area,
                            street: m.street,
                            infokod: m.infokod || '',
                            history: []
                        });
                    }
                    metersMap.get(m.id).history.push({
                        date: file.date,
                        dateStr: dateStr,
                        value: m.value
                    });
                });
            });

            const areaDropdown = document.getElementById('areaFilter');
            areaDropdown.innerHTML = '<option value="all">Alla områden</option>';
            areasSet.forEach(a => { areaDropdown.innerHTML += `<option value="${a}">${a}</option>`; });
            areaDropdown.value = currentAreaFilter;

            // Beräkna rumsliga gatu-kluster (Huvudledningar)
            metersMap.forEach(m => {
                if (m.history.length < 2) return;
                const first = m.history[0];
                const last = m.history[m.history.length - 1];
                
                if (!streetClusters[m.street]) {
                    streetClusters[m.street] = { totalMeters: 0, increasingMeters: 0, totalNoise: 0 };
                }
                streetClusters[m.street].totalMeters++;
                streetClusters[m.street].totalNoise += last.value;
                
                if (last.value >= 20 && (last.value - first.value) >= 12) {
                    streetClusters[m.street].increasingMeters++;
                }
            });

            for (let [id, m] of metersMap) {
                if (m.history.length === 0) continue;

                const first = m.history[0];
                const last = m.history[m.history.length - 1];
                
                let totalChange = first.value > 0 ? ((last.value / first.value) - 1) * 100 : last.value * 100;
                const maxValue = Math.max(...m.history.map(h => h.value));
                
                let finalCategory = userCategories.get(m.id) || smartClassify(m);
                
                let isStreetCluster = streetClusters[m.street] && 
                                      streetClusters[m.street].increasingMeters >= 2 && 
                                      (streetClusters[m.street].increasingMeters / streetClusters[m.street].totalMeters) >= 0.25;

                currentResults.push({
                    id: m.id,
                    adress: m.adress,
                    serienummer: m.serienummer,
                    area: m.area,
                    street: m.street,
                    history: m.history,
                    change: totalChange,
                    max: maxValue,
                    category: finalCategory,
                    isCluster: isStreetCluster
                });
            }
            
            document.getElementById('results').style.display = 'block';
            displayResults();
        }

        function handleFiles(files) {
            let loadedCount = 0;
            for (let file of files) {
                const date = extractDateFromFilename(file.name);
                parseExcelFile(file).then(meters => {
                    if (meters.length > 0) {
                        uploadedFiles.push({ name: file.name, date: date, meters: meters });
                    }
                    loadedCount++;
                    if (loadedCount === files.length) updateFileList();
                }).catch(err => {
                    console.error(err);
                    loadedCount++;
                    if (loadedCount === files.length) updateFileList();
                });
            }
        }

        function updateFileList() {
            const grid = document.getElementById('fileList');
            grid.innerHTML = '';
            if(uploadedFiles.length === 0) {
                grid.innerHTML = '<span class="no-files-text">Inga datafiler laddade</span>';
                return;
            }
            uploadedFiles.forEach((f, idx) => {
                const chip = document.createElement('div');
                chip.className = 'file-chip-compact';
                chip.innerHTML = `<span>📄 ${f.name.substring(0, 20)}</span> <strong class="remove-file-x">×</strong>`;
                chip.querySelector('.remove-file-x').onclick = (e) => {
                    e.stopPropagation();
                    uploadedFiles.splice(idx, 1);
                    updateFileList();
                };
                grid.appendChild(chip);
            });
        }

        // Urklippsfunktion för snabb överföring till externt system
        function copyToClipboard(address, serial) {
            const textToCopy = `${address} (Mätarnummer: ${serial})`;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "Kopierad! ✔";
                btn.style.background = "#1db954";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#222";
                }, 1500);
            }).catch(err => {
                console.error("Kunde inte kopiera text: ", err);
            });
        }

        function displayResults() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            currentResults.sort((a, b) => {
                return currentSort.direction === 'desc' ? b[currentSort.column] - a[currentSort.column] : a[currentSort.column] - b[currentSort.column];
            });

            let filtered = currentResults.filter(r => {
                if (currentAreaFilter !== 'all' && r.area !== currentAreaFilter) return false;
                if (ignoredIds.has(r.id) && currentCategoryFilter !== 'ignored') return false; 
                if (currentCategoryFilter !== 'all' && r.category !== currentCategoryFilter) return false;
                
                return !query || r.adress.toLowerCase().includes(query) || r.serienummer.includes(query) || r.street.toLowerCase().includes(query);
            });

            updateStatsAndInsights();

            filtered.forEach(r => {
                const tr = document.createElement('tr');
                tr.className = `row-${r.category}`;

                const catInfo = categories[r.category] || categories.normal;
                const historyStr = r.history.map(h => `${h.dateStr}: <strong>${h.value} dB</strong>`).join(' → ');
                const changeSign = r.change > 0 ? '+' : '';

                let catOptions = '';
                for (let c in categories) {
                    catOptions += `<option value="${c}" ${r.category === c ? 'selected' : ''}>${categories[c].symbol} ${categories[c].label}</option>`;
                }

                tr.innerHTML = `
                    <td><button class="action-btn" onclick="toggleInteresting('${r.id}')">${interestingIds.has(r.id) ? '⭐' : '☆'}</button></td>
                    <td><button class="action-btn" onclick="toggleIgnore('${r.id}')">👁️</button></td>
                    <td>
                        <select class="category-select-compact" onchange="changeCategory('${r.id}', this.value)">
                            ${catOptions}
                        </select>
                    </td>
                    <td>
                        <div class="table-adress-container">
                            <div class="table-adress-text">${r.adress}</div>
                        </div>
                        ${r.isCluster ? `<span class="cluster-banner">🔗 HUVUDLEDNINGSKLUSTER (${streetClusters[r.street].increasingMeters} mätare sammankopplade)</span>` : ''}
                    </td>
                    <td style="text-align: center;">
                        <button class="copy-btn" onclick="copyToClipboard('${r.adress}', '${r.serienummer}')">📋 Kopiera</button>
                    </td>
                    <td><code>${r.serienummer}</code></td>
                    <td><span class="badge" style="background:#333;">${r.area}</span></td>
                    <td><div class="history-flow-container">${historyStr}</div></td>
                    <td><span class="${r.change > 0 ? 'trend-up' : ''}">${changeSign}${r.change.toFixed(1)}%</span></td>
                    <td><strong>${r.max}</strong></td>
                    <td><span class="badge" style="background:${catInfo.bg}; color:${catInfo.color}">${catInfo.label}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatsAndInsights() {
            let counts = { total: currentResults.length, extreme: 0, misstankt: 0, leak_code: 0, lagad: 0, storing: 0, clusters: 0 };
            let clusterStreets = new Set();

            currentResults.forEach(r => {
                if (r.category === 'extreme') counts.extreme++;
                if (r.category === 'misstankt') counts.misstankt++;
                if (r.category === 'leak_code') counts.leak_code++;
                if (r.category === 'lagad') counts.lagad++;
                if (r.category === 'storing') counts.storing++;
                if (r.isCluster) clusterStreets.add(r.street);
            });
            counts.clusters = clusterStreets.size;

            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card ${currentCategoryFilter === 'all' ? 'active' : ''}" onclick="setCategoryFilter('all')"><div class="num">${counts.total}</div><div class="label">Alla mätare</div></div>
                <div class="stat-card color-extreme ${currentCategoryFilter === 'extreme' ? 'active' : ''}" onclick="setCategoryFilter('extreme')"><div class="num">${counts.extreme}</div><div class="label">Akuta explosioner</div></div>
                <div class="stat-card color-misstankt ${currentCategoryFilter === 'misstankt' ? 'active' : ''}" onclick="setCategoryFilter('misstankt')"><div class="num">${counts.misstankt}</div><div class="label">Förhöjda</div></div>
                <div class="stat-card color-leak ${currentCategoryFilter === 'leak_code' ? 'active' : ''}" onclick="setCategoryFilter('leak_code')"><div class="num">${counts.leak_code}</div><div class="label">Kamstrup LEAK</div></div>
                <div class="stat-card color-storing ${currentCategoryFilter === 'storing' ? 'active' : ''}" onclick="setCategoryFilter('storing')"><div class="num">${counts.storing}</div><div class="label">Pumpar / Störning</div></div>
            `;

            const insight = document.getElementById('insightBox');
            if (counts.clusters > 0) {
                let gator = Array.from(clusterStreets).join(', ');
                insight.innerHTML = `📡 <strong>Morgonanalys - Nätverkskluster identifierat:</strong> Detekterade **${counts.clusters} misstänkta läckor på huvudledningar** på [${gator}]. Systemet har sorterat bort fastighetsfel och isolerat parallella flödesljud som tyder på brott i distributionsnätet eller korsande fjärrvärme.`;
                insight.style.borderColor = "var(--clr-misstankt)";
                insight.style.backgroundColor = "rgba(249, 115, 22, 0.04)";
            } else if (counts.extreme > 0) {
                insight.innerHTML = `⚠️ <strong>Akut Systeminsikt:</strong> Hittade **${counts.extreme} bekräftade akuta flödesexplosioner** med ihållande, kritiskt dB-brus. Prioritera fältkontroll på dessa direkt.`;
                insight.style.borderColor = "var(--clr-extreme)";
                insight.style.backgroundColor = "rgba(239, 68, 68, 0.04)";
            } else {
                insight.innerHTML = `💡 <strong>Systeminsikt:</strong> Distributionsnätet stabilt. Inga kritiska huvudledningsbrott eller plötsliga rörbrott identifierade från nattens lägsta mätningar.`;
                insight.style.borderColor = "var(--primary)";
                insight.style.backgroundColor = "var(--bg-card)";
            }
        }

        function setCategoryFilter(cat) { currentCategoryFilter = cat; displayResults(); }
        
        function changeCategory(id, newCat) {
            userCategories.set(id, newCat);
            let item = currentResults.find(r => r.id === id);
            if(item) item.category = newCat;
            displayResults();
        }

        function toggleInteresting(id) {
            if (interestingIds.has(id)) interestingIds.delete(id); else interestingIds.add(id);
            displayResults();
        }

        function toggleIgnore(id) {
            ignoredIds.add(id);
            displayResults();
        }

        function setSort(col) {
            if (currentSort.column === col) {
                currentSort.direction = currentSort.direction === 'desc' ? 'asc' : 'desc';
            } else {
                currentSort.column = col; currentSort.direction = 'desc';
            }
            displayResults();
        }

        document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => handleFiles(Array.from(e.target.files));
        document.getElementById('analyzeBtn').onclick = () => runAnalysis();
        document.getElementById('searchInput').oninput = () => displayResults();
        document.getElementById('areaFilter').onchange = (e) => { currentAreaFilter = e.target.value; displayResults(); };
        document.getElementById('sort-change').onclick = () => setSort('change');
        document.getElementById('sort-max').onclick = () => setSort('max');

        document.getElementById('clearBtn').onclick = () => {
            uploadedFiles = []; currentResults = []; ignoredIds.clear(); interestingIds.clear(); userCategories.clear();
            updateFileList();
            document.getElementById('results').style.display = 'none';
        };
    </script>
</body>
</html>
