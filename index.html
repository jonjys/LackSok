<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Läcksök - Mätaranalys</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f5; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: #1a5f7a; color: white; padding: 20px 24px; }
        header h1 { font-size: 1.8rem; }
        .upload-section { padding: 20px 24px; background: #f8f9fa; border-bottom: 1px solid #e0e4e8; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin: 2px; }
        .btn-primary { background: #1a5f7a; color: white; }
        .btn-success { background: #2c7a4d; color: white; }
        .btn-danger { background: #c0392b; color: white; }
        .btn-warning { background: #e67e22; color: white; }
        .btn-interesting { background: #f39c12; color: white; }
        .btn-interesting-active { background: #e67e22; color: white; box-shadow: 0 0 0 2px #f39c12; }
        .file-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .file-chip { background: #e9ecef; padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .search-section { background: #fff; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #ddd; }
        .search-input { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; }
        .search-input:focus { outline: none; border-color: #1a5f7a; }
        .results-section { padding: 20px 24px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e9ecef; }
        th { background: #e9ecef; position: sticky; top: 0; }
        .critical { background: #fee2e2; }
        .high { background: #fff3e0; }
        .ignored { background: #f0f0f0 !important; opacity: 0.5; text-decoration: line-through; }
        .interesting { background: #fff8e7 !important; border-left: 4px solid #f39c12; }
        .trend-up { color: #c0392b; font-weight: bold; }
        .summary-cards { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { background: #f0f4f8; padding: 10px 20px; border-radius: 10px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card .num { font-size: 28px; font-weight: bold; }
        .card.interesting-card { background: #fff8e7; border: 1px solid #f39c12; }
        .info-box { background: #e8f4f8; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 13px; }
        .action-buttons { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .ignore-btn, .interesting-btn { background: none; border: none; cursor: pointer; font-size: 18px; padding: 4px 8px; border-radius: 20px; transition: all 0.2s; }
        .ignore-btn:hover, .interesting-btn:hover { background: #dee2e6; transform: scale(1.05); }
        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
        .filter-btn { padding: 6px 16px; border-radius: 30px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .filter-btn:hover { background: #e9ecef; }
        .filter-btn.active { background: #1a5f7a; color: white; border-color: #1a5f7a; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 8px; }
        .badge-interesting { background: #f39c12; color: white; }
        .ready-badge { background: #27ae60; color: white; }
        @media (max-width: 768px) { body { padding: 12px; } th, td { font-size: 11px; padding: 6px; } .btn { padding: 6px 12px; font-size: 12px; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🔍 Läcksök</h1>
        <p>Analysera mätardata • Markera intressanta • Ignorera oönskade</p>
    </header>

    <div class="upload-section">
        <button id="uploadBtn" class="btn btn-primary">📂 + Lägg till mätarfiler</button>
        <input type="file" id="fileInput" multiple accept=".xlsx,.xls" style="display:none">
        <div id="fileList" class="file-grid"></div>
        
        <div class="action-buttons">
            <button id="analyzeBtn" class="btn btn-success">📊 Analysera</button>
            <button id="clearBtn" class="btn btn-danger">🗑️ Rensa alla</button>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Sök på adress... t.ex. 'trast' eller 'björkvändan'">
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">📋 Alla</button>
            <button class="filter-btn" data-filter="critical">🔥 >100%</button>
            <button class="filter-btn" data-filter="high">⚠️ 50-100%</button>
            <button class="filter-btn" data-filter="positive">✅ Positiva</button>
            <button class="filter-btn" data-filter="interesting">⭐ Intressanta</button>
            <button class="filter-btn" data-filter="ignored">🚫 Ignorerade</button>
        </div>
    </div>

    <div id="results" class="results-section" style="display:none">
        <div class="summary-cards" id="summaryCards"></div>
        <div id="trendTable"></div>
        <button id="exportBtn" class="btn btn-primary" style="margin-top:15px;">📎 Exportera till Excel</button>
    </div>
</div>

<script>
let uploadedFiles = [];
let currentResults = [];
let ignoredIds = new Set();
let interestingIds = new Set();
let currentFilter = "all";

// Ladda från localStorage
function loadSaved() {
    const savedIgnored = localStorage.getItem('lacksok_ignored');
    if (savedIgnored) ignoredIds = new Set(JSON.parse(savedIgnored));
    const savedInteresting = localStorage.getItem('lacksok_interesting');
    if (savedInteresting) interestingIds = new Set(JSON.parse(savedInteresting));
}

function saveIgnored() {
    localStorage.setItem('lacksok_ignored', JSON.stringify([...ignoredIds]));
}

function saveInteresting() {
    localStorage.setItem('lacksok_interesting', JSON.stringify([...interestingIds]));
}

function toggleIgnore(id) {
    if (ignoredIds.has(id)) {
        ignoredIds.delete(id);
    } else {
        ignoredIds.add(id);
        // Om vi ignorerar, ta bort från intressanta om den finns där
        if (interestingIds.has(id)) interestingIds.delete(id);
    }
    saveIgnored();
    saveInteresting();
    displayResults();
}

function toggleInteresting(id) {
    if (interestingIds.has(id)) {
        interestingIds.delete(id);
    } else {
        interestingIds.add(id);
        // Om vi lägger till som intressant, ta bort från ignorerad om den finns där
        if (ignoredIds.has(id)) ignoredIds.delete(id);
    }
    saveInteresting();
    saveIgnored();
    displayResults();
}

function extractDateFromFilename(filename) {
    const match = filename.match(/(\d{4}-\d{2}-\d{2})\s+(\d{2})-(\d{2})/);
    if (match) return new Date(`${match[1]}T${match[2]}:${match[3]}:00`);
    return new Date();
}

async function parseExcelFile(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            
            if (!rows || rows.length < 2) { resolve([]); return; }
            
            let startRow = 0;
            for (let r = 0; r < Math.min(10, rows.length); r++) {
                if (String(rows[r]?.[0] || "").toLowerCase().includes('adress')) {
                    startRow = r;
                    break;
                }
            }
            
            const meters = [];
            for (let r = startRow + 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row) continue;
                
                let adress = row[0] ? String(row[0]).trim().toUpperCase() : "";
                let serienummer = row[1] ? String(row[1]).trim() : "";
                let sensateValue = parseFloat(row[4]);
                
                if (isNaN(sensateValue)) continue;
                if (!adress && !serienummer) continue;
                if (adress === "FALSKT" || adress === "FALSE") continue;
                
                meters.push({
                    id: serienummer || adress,
                    adress: adress,
                    serienummer: serienummer,
                    sensateValue: sensateValue
                });
            }
            resolve(meters);
        };
        reader.readAsArrayBuffer(file);
    });
}

function calculateChange(oldVal, newVal) {
    if (!oldVal || oldVal === 0) return null;
    return ((newVal - oldVal) / oldVal) * 100;
}

async function analyzeAllData() {
    if (uploadedFiles.length < 2) {
        alert("Ladda upp minst 2 filer!");
        return;
    }
    
    uploadedFiles.sort((a, b) => a.date - b.date);
    const metersMap = new Map();
    
    for (let fileData of uploadedFiles) {
        for (let meter of fileData.meters) {
            if (!metersMap.has(meter.id)) {
                metersMap.set(meter.id, {
                    id: meter.id,
                    adress: meter.adress,
                    serienummer: meter.serienummer,
                    measurements: []
                });
            }
            metersMap.get(meter.id).measurements.push({
                date: fileData.date,
                dateStr: formatDate(fileData.date),
                value: meter.sensateValue
            });
        }
    }
    
    const results = [];
    for (let meter of metersMap.values()) {
        meter.measurements.sort((a,b) => a.date - b.date);
        if (meter.measurements.length < 2) continue;
        
        const first = meter.measurements[0];
        const last = meter.measurements[meter.measurements.length-1];
        const change = calculateChange(first.value, last.value);
        
        if (change !== null && isFinite(change)) {
            results.push({
                id: meter.id,
                adress: meter.adress,
                serienummer: meter.serienummer,
                firstValue: first.value,
                lastValue: last.value,
                firstDate: first.dateStr,
                lastDate: last.dateStr,
                change: change,
                history: meter.measurements.map(m => `${m.dateStr}:${m.value}`).join(' → ')
            });
        }
    }
    
    results.sort((a,b) => b.change - a.change);
    currentResults = results;
    displayResults();
}

function formatDate(date) {
    return `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
}

function formatPercent(value) {
    if (value > 1000) return "🔥 " + Math.round(value) + "%";
    if (value > 100) return "⚠️ " + Math.round(value) + "%";
    if (value > 0) return "▲ " + value.toFixed(1) + "%";
    if (value < 0) return "▼ " + Math.abs(value).toFixed(1) + "%";
    return "0%";
}

function displayResults() {
    const searchInput = document.getElementById('searchInput').value.toLowerCase().trim();
    
    // Basfiltrering baserat på flik
    let filtered = currentResults;
    
    if (currentFilter === 'ignored') {
        filtered = currentResults.filter(r => ignoredIds.has(r.id));
    } else if (currentFilter === 'interesting') {
        filtered = currentResults.filter(r => interestingIds.has(r.id));
    } else {
        filtered = currentResults.filter(r => !ignoredIds.has(r.id));
    }
    
    // Sökfiltrering
    if (searchInput) {
        filtered = filtered.filter(r => 
            r.adress.toLowerCase().includes(searchInput) ||
            (r.serienummer && r.serienummer.includes(searchInput))
        );
    }
    
    // Procentfiltrering (inte för ignored/interesting flikar)
    if (currentFilter !== 'ignored' && currentFilter !== 'interesting') {
        if (currentFilter === 'critical') {
            filtered = filtered.filter(r => r.change >= 100);
        } else if (currentFilter === 'high') {
            filtered = filtered.filter(r => r.change >= 50 && r.change < 100);
        } else if (currentFilter === 'positive') {
            filtered = filtered.filter(r => r.change > 0);
        }
    }
    
    // Statistik
    const total = currentResults.length;
    const active = currentResults.filter(r => !ignoredIds.has(r.id)).length;
    const critical = currentResults.filter(r => !ignoredIds.has(r.id) && r.change >= 100).length;
    const high = currentResults.filter(r => !ignoredIds.has(r.id) && r.change >= 50 && r.change < 100).length;
    const positive = currentResults.filter(r => !ignoredIds.has(r.id) && r.change > 0).length;
    const interestingCount = interestingIds.size;
    const ignoredCount = ignoredIds.size;
    
    document.getElementById('summaryCards').innerHTML = `
        <div class="card" onclick="setFilter('all')"><h3>📊 Totalt</h3><div class="num">${total}</div></div>
        <div class="card" onclick="setFilter('positive')"><h3>✅ Aktiva</h3><div class="num">${active}</div></div>
        <div class="card" onclick="setFilter('critical')"><h3>🔥 >100%</h3><div class="num">${critical}</div></div>
        <div class="card" onclick="setFilter('high')"><h3>⚠️ 50-100%</h3><div class="num">${high}</div></div>
        <div class="card interesting-card" onclick="setFilter('interesting')"><h3>⭐ Intressanta</h3><div class="num">${interestingCount}</div></div>
        <div class="card" onclick="setFilter('ignored')"><h3>🚫 Ignorerade</h3><div class="num">${ignoredCount}</div></div>
    `;
    
    if (filtered.length === 0) {
        document.getElementById('trendTable').innerHTML = `<div class="info-box">🔍 Ingen mätare matchar "${currentFilter}"${searchInput ? ` och "${searchInput}"` : ''}</div>`;
        document.getElementById('results').style.display = 'block';
        return;
    }
    
    let html = `<tr><thead><tr>
        <th>⭐</th><th>👁️</th><th>Adress</th><th>Serienummer</th><th>Första</th><th>Senaste</th><th>📈 Förändring</th><th>Period</th>
    </tr></thead><tbody>`;
    
    for (let r of filtered) {
        const isIgnored = ignoredIds.has(r.id);
        const isInteresting = interestingIds.has(r.id);
        const riskClass = !isIgnored && r.change >= 100 ? 'critical' : (!isIgnored && r.change >= 50 ? 'high' : '');
        let rowClass = '';
        if (isIgnored) rowClass = 'ignored';
        else if (isInteresting) rowClass = 'interesting';
        else if (riskClass) rowClass = riskClass;
        
        html += `<tr class="${rowClass}">
            <td><button class="interesting-btn" onclick="toggleInteresting('${r.id}')" title="${isInteresting ? 'Ta bort från intressanta' : 'Markera som intressant (åka till)'}" style="color: ${isInteresting ? '#f39c12' : '#ccc'}">${isInteresting ? '⭐' : '☆'}</button></td>
            <td><button class="ignore-btn" onclick="toggleIgnore('${r.id}')" title="${isIgnored ? 'Återställ' : 'Ignorera'}">${isIgnored ? '✅' : '👁️'}</button></td>
            <td><strong>${r.adress}</strong>${isInteresting ? ' <span class="badge badge-interesting">⭐ Att åka till</span>' : ''}${isIgnored ? ' <span class="badge">🚫 Ignorerad</span>' : ''}</td>
            <td>${r.serienummer || "-"}</td>
            <td>${r.firstValue}</td>
            <td><strong>${r.lastValue}</strong></td>
            <td class="trend-up">${formatPercent(r.change)}</td>
            <td>${r.firstDate} → ${r.lastDate}</td>
        </tr>`;
    }
    
    html += `</tbody></table>
    <div class="info-box">
        ⭐ <strong>Intressanta mätare:</strong> Klicka på ☆ för att lägga till mätare du vill åka till.<br>
        👁️ <strong>Ignorera:</strong> Klicka på ögat för att dölja oönskade mätare.<br>
        📋 <strong>Tips:</strong> Klicka på korten ovan för att snabbt växla vy!
    </div>`;
    
    document.getElementById('trendTable').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function setFilter(filter) {
    currentFilter = filter;
    // Uppdatera aktiva knappar
    document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.dataset.filter === filter) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    displayResults();
}

async function handleFiles(files) {
    for (let file of files) {
        if (file.name.match(/\.(xlsx|xls)$/i)) {
            const date = extractDateFromFilename(file.name);
            const meters = await parseExcelFile(file);
            uploadedFiles.push({ fileName: file.name, date: date, meters: meters });
        }
    }
    updateFileList();
    if (uploadedFiles.length >= 2) analyzeAllData();
}

function updateFileList() {
    const container = document.getElementById('fileList');
    if (uploadedFiles.length === 0) {
        container.innerHTML = '<p style="color:#999;">Inga filer uppladdade</p>';
        return;
    }
    let html = '<div class="file-grid">';
    uploadedFiles.forEach((f, idx) => {
        html += `<div class="file-chip" onclick="removeFile(${idx})">📅 ${formatDate(f.date)} - ${f.meters.length} st</div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function removeFile(index) {
    uploadedFiles.splice(index, 1);
    updateFileList();
    if (uploadedFiles.length >= 2) analyzeAllData();
    else document.getElementById('results').style.display = 'none';
}

function exportReport() {
    let exportData = currentResults.map(r => ({
        'Adress': r.adress,
        'Serienummer': r.serienummer,
        'Första värde': r.firstValue,
        'Senaste värde': r.lastValue,
        'Förändring %': r.change.toFixed(1),
        'Period': `${r.firstDate} → ${r.lastDate}`,
        'Intressant': interestingIds.has(r.id) ? '⭐ Ja' : '',
        'Ignorerad': ignoredIds.has(r.id) ? 'Ja' : '',
        'Historik': r.history
    }));
    
    const ws = XLSX.utils.json_to_sheet(exportData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Läcksök");
    XLSX.writeFile(wb, `lacksok_${new Date().toISOString().slice(0,19)}.xlsx`);
}

// Event listeners
document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = (e) => handleFiles(Array.from(e.target.files));
document.getElementById('analyzeBtn').onclick = () => analyzeAllData();
document.getElementById('clearBtn').onclick = () => { 
    uploadedFiles = []; 
    updateFileList(); 
    document.getElementById('results').style.display = 'none';
    ignoredIds.clear();
    interestingIds.clear();
    saveIgnored();
    saveInteresting();
};
document.getElementById('exportBtn').onclick = exportReport;
document.getElementById('searchInput').oninput = () => displayResults();

// Filter-knappar
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => setFilter(btn.dataset.filter);
});

window.toggleIgnore = toggleIgnore;
window.toggleInteresting = toggleInteresting;
window.removeFile = removeFile;
window.setFilter = setFilter;

loadSaved();
updateFileList();
</script>
</body>
</html>
